/* ══════════════════════════════════════════════════════
   🔐  AUTHENTIFICATION MICROSOFT (MSAL)
   ══════════════════════════════════════════════════════ */
const msalInstance = new msal.PublicClientApplication({
  auth: {
    clientId:    CONFIG.clientId,
    authority:  `https://login.microsoftonline.com/${CONFIG.tenantId}`,
    redirectUri: CONFIG.redirectUri,
  },
  cache: { cacheLocation: "sessionStorage", storeAuthStateInCookie: false },
});

const SCOPES = ["Files.ReadWrite.All", "Sites.ReadWrite.All"];

const msalInit = (() => {
  let p = null;
  return () => { if (!p) p = msalInstance.initialize(); return p; };
})();

const getToken = async () => {
  await msalInit();
  const accounts = msalInstance.getAllAccounts();
  if (!accounts.length) throw new Error("not_authenticated");
  try {
    const r = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
    return r.accessToken;
  } catch {
    const r = await msalInstance.acquireTokenPopup({ scopes: SCOPES });
    return r.accessToken;
  }
};

const doLogin = async () => {
  await msalInit();
  await msalInstance.loginPopup({ scopes: SCOPES });
  return msalInstance.getAllAccounts()[0];
};

const doLogout = async () => {
  await msalInit();
  const a = msalInstance.getAllAccounts()[0];
  if (a) await msalInstance.logoutPopup({ account: a });
};

/* ══════════════════════════════════════════════════════
   📊  MICROSOFT GRAPH — EXCEL SUR SHAREPOINT
   ══════════════════════════════════════════════════════ */
let _siteId = null;

const getSiteId = async (token) => {
  if (_siteId) return _siteId;
  const r = await fetch(
    `https://graph.microsoft.com/v1.0/sites/${CONFIG.siteHost}:${CONFIG.sitePath}`,
    { headers: { Authorization: `Bearer ${token}` } }
  );
  if (!r.ok) throw new Error("Site SharePoint introuvable : vérifier siteHost et sitePath");
  _siteId = (await r.json()).id;
  return _siteId;
};

const xlFetch = async (method, path, body, token) => {
  const siteId = await getSiteId(token);
  const encodedPath = CONFIG.filePath.split("/").map(encodeURIComponent).join("/");
  const url = `https://graph.microsoft.com/v1.0/sites/${siteId}/drive/root:/${encodedPath}:/workbook/worksheets('DATA')/${path}`;
  const res = await fetch(url, {
    method,
    headers: {
      Authorization: `Bearer ${token}`,
      ...(body ? { "Content-Type": "application/json" } : {}),
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Erreur Graph (${res.status}): ${err}`);
  }
  return res.status === 204 ? null : res.json();
};

/* Colonnes DATA (ordre fixe) */
const ROW_KEYS = [
  "id","date","mois","annee","calibre","machine",
  "nbBoites","effectif","dureeH","duree","heuresOp","hParBoite",
  "coutBoite","coutStandard","coutTotalReel","coutTotalStandard",
  "ecart","details","trs","operation"
];
const NUM_COLS = ROW_KEYS.length; // 20

const parseRow = (r) => ({
  id:                r[0],
  date:              r[1]  || "",
  mois:              r[2]  || "",
  annee:             r[3]  || "2026",
  calibre:           r[4]  || "",
  machine:           r[5]  || "",
  nbBoites:          Number(r[6])  || 0,
  effectif:          Number(r[7])  || 0,
  dureeH:            Number(r[8])  || 0,
  duree:             r[9]  || "",
  heuresOp:          Number(r[10]) || 0,
  hParBoite:         Number(r[11]) || 0,
  coutBoite:         Number(r[12]) || 0,
  coutStandard:      Number(r[13]) || 0,
  coutTotalReel:     Number(r[14]) || 0,
  coutTotalStandard: Number(r[15]) || 0,
  ecart:             Number(r[16]) || 0,
  details:           r[17] || "",
  trs:               Number(r[18]) || 0,
  operation:         r[19] || "",
});

const entryToRow = (e) => ROW_KEYS.map(k => e[k] ?? "");

const LAST_COL = String.fromCharCode(64 + NUM_COLS); // "T"

const loadFromSharePoint = async () => {
  const token = await getToken();
  const data = await xlFetch("GET", "usedRange", null, token);
  if (!data?.values || data.values.length <= 1) return [];
  const [, ...rows] = data.values;
  return rows
    .filter(r => r[0] !== null && r[0] !== "" && r[0] !== undefined)
    .map(parseRow);
};

const saveToSharePoint = async (entries) => {
  const token = await getToken();
  // 1. Effacer les lignes de données (garder l'en-tête ligne 1)
  await xlFetch("POST", "range(address='A2:"+LAST_COL+"2001')/clear",
    { applyTo: "contents" }, token);
  if (!entries.length) return;
  // 2. Réécrire toutes les entrées
  const values = entries.map(entryToRow);
  const endRow  = 1 + entries.length;
  await xlFetch("PATCH",
    `range(address='A2:${LAST_COL}${endRow}')`,
    { values }, token);
};

function App() {
  const [authState,   setAuthState]   = useState("loading");
  const [authError,   setAuthError]   = useState(null);
  const [authLoading, setAuthLoading] = useState(false);
  const [user,        setUser]        = useState(null);
  const [entries,     setEntries]     = useState([]);
  const [syncing,     setSyncing]     = useState(false);
  const [syncError,   setSyncError]   = useState(null);
  const [page,        setPage]        = useState("dashboard");
  const [filterMois,  setFilterMois]  = useState("Tous");
  const [besoins,     setBesoins]     = useState(Object.fromEntries(CALIBRES.map(c=>[c,0])));
  const [planCfg,     setPlanCfg]     = useState(Object.fromEntries(POSTES.map(p=>[p.id,{heuresJ:8,effectif:p.effMin}])));
  const [nbJours,     setNbJours]     = useState(5);

  /* Init auth */
  useEffect(() => {
    (async () => {
      try {
        await msalInit();
        await msalInstance.handleRedirectPromise();
        const account = msalInstance.getAllAccounts()[0];
        if (account) {
          setUser(account);
          setAuthState("authenticated");
          setSyncing(true);
          const data = await loadFromSharePoint();
          setEntries(data);
          setSyncing(false);
        } else {
          setAuthState("unauthenticated");
        }
      } catch (e) {
        setAuthState("unauthenticated");
        if (!e.message.includes("not_authenticated")) setAuthError(e.message);
        setSyncing(false);
      }
    })();
  }, []);

  const handleLogin = async () => {
    setAuthLoading(true); setAuthError(null);
    try {
      const account = await doLogin();
      setUser(account);
      setAuthState("authenticated");
      setSyncing(true);
      const data = await loadFromSharePoint();
      setEntries(data);
      setSyncing(false);
    } catch (e) {
      setAuthError(e.message);
    } finally {
      setAuthLoading(false);
    }
  };

  const handleLogout = async () => {
    await doLogout();
    setAuthState("unauthenticated");
    setEntries([]);
    setUser(null);
  };

  /* Save to SharePoint + update local state */
  const saveEntries = async (ne) => {
    setEntries(ne);
    setSyncing(true); setSyncError(null);
    try {
      await saveToSharePoint(ne);
    } catch (e) {
      setSyncError(e.message);
    } finally {
      setSyncing(false);
    }
  };

  /* Reload from SharePoint */
  const handleReload = async () => {
    setSyncing(true); setSyncError(null);
    try {
      const data = await loadFromSharePoint();
      setEntries(data);
    } catch (e) {
      setSyncError(e.message);
    } finally {
      setSyncing(false);
    }
  };

  /* Auth screens */
  if (authState === "loading") {
    return (
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#050c18"}}>
        <div style={{textAlign:"center"}}>
          <div style={{width:48,height:48,border:"3px solid #0ea5e9",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 1s linear infinite",margin:"0 auto 16px"}}/>
          <div style={{color:"#3d5a78",fontSize:13}}>Initialisation...</div>
        </div>
      </div>
    );
  }
  if (authState === "unauthenticated") {
    return <LoginScreen onLogin={handleLogin} error={authError} loading={authLoading}/>;
  }

  /* Dashboard calc */
  const filt    = filterMois==="Tous"?entries:entries.filter(e=>e.mois===filterMois);
  const totalB  = filt.reduce((s,e)=>s+e.nbBoites,0);
  const totalH  = filt.reduce((s,e)=>s+e.heuresOp,0);
  const totalCR = filt.reduce((s,e)=>s+e.coutTotalReel,0);
  const totalCS = filt.reduce((s,e)=>s+e.coutTotalStandard,0);
  const avgTRS  = filt.length?filt.reduce((s,e)=>s+(e.trs||0),0)/filt.length:0;
  const ecart   = totalCR-totalCS;

  const byMois = MOIS_LIST.map(m=>{
    const me=entries.filter(e=>e.mois===m);
    return{m:m.slice(0,4),
      boites:me.reduce((s,e)=>s+e.nbBoites,0),
      heures:parseFloat(me.reduce((s,e)=>s+e.heuresOp,0).toFixed(1)),
      cr:Math.round(me.reduce((s,e)=>s+e.coutTotalReel,0)),
      cs:Math.round(me.reduce((s,e)=>s+e.coutTotalStandard,0)),
      trs:me.length?parseFloat((me.reduce((s,e)=>s+(e.trs||0),0)/me.length).toFixed(1)):0
    };
  }).filter(x=>x.boites>0||x.cr>0);

  const byPoste = POSTES.map(p=>{
    const pe=filt.filter(e=>e.machine===p.nom);
    return{name:p.nom.replace("Etuieuse ","Etu. ").replace("Fardeleuse ","Fard. "),boites:pe.reduce((s,e)=>s+e.nbBoites,0),color:p.color};
  }).filter(x=>x.boites>0);

  const planResults = POSTES.map(p=>{
    const cfg=planCfg[p.id];
    const bb=CALIBRES.reduce((s,c)=>(CALIBRE_POSTE[c]?.includes(p.id)?s+(besoins[c]||0):s),0);
    const cap=p.capH*cfg.heuresJ*nbJours;
    const chg=cap>0?parseFloat(((bb/cap)*100).toFixed(1)):0;
    const hb=p.capH>0?parseFloat((bb/p.capH).toFixed(1)):0;
    const effBesoin=hb>0?Math.max(p.effMin,Math.min(p.effMax,Math.ceil(hb/cfg.heuresJ))):0;
    return{...p,bb:Math.floor(bb),hb,chg,effBesoin,cfg};
  });

  const navItems = [
    {id:"dashboard",   n:"BarChart2",label:"Dashboard"},
    {id:"saisie",      n:"Plus",     label:"Saisie"},
    {id:"planning",    n:"Layers",   label:"Planning"},
    {id:"implantation",n:"MapPin",   label:"Implantation"},
  ];

  return (
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",background:"#050c18",minHeight:"100vh",color:"#e2e8f0"}}>

      {/* HEADER */}
      <header style={{background:"#090f1e",borderBottom:"1px solid #152333",display:"flex",alignItems:"center",padding:"0 16px",height:56,position:"sticky",top:0,zIndex:100,gap:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          <div style={{width:32,height:32,background:"linear-gradient(135deg,#0ea5e9,#6366f1)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Ico n="Package" sz={17} col="white"/>
          </div>
          <div>
            <div style={{fontSize:12,fontWeight:800,color:"#f1f5f9",letterSpacing:"0.06em"}}>PSF CONDITIONNEMENT</div>
            <div style={{fontSize:8,color:"#2a4a65",letterSpacing:"0.12em",fontWeight:700}}>SILVER FOOD</div>
          </div>
        </div>

        <nav style={{display:"flex",gap:2,marginLeft:24,flex:1}}>
          {navItems.map(({id,n,label})=>(
            <button key={id} onClick={()=>setPage(id)} style={{
              padding:"6px 12px",borderRadius:6,border:"none",cursor:"pointer",
              background:page===id?"rgba(14,165,233,0.12)":"transparent",
              color:page===id?"#7dd3fc":"#3d5a78",
              fontSize:11,fontWeight:700,display:"flex",alignItems:"center",gap:5,
              borderBottom:page===id?"2px solid #0ea5e9":"2px solid transparent",transition:"all 0.15s"
            }}>
              <Ico n={n} sz={13}/>{label}
            </button>
          ))}
        </nav>

        {/* Sync status */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginLeft:"auto"}}>
          {syncing && (
            <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"#3d5a78"}}>
              <div style={{width:10,height:10,border:"2px solid #0ea5e9",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
              Sync...
            </div>
          )}
          {syncError && (
            <div title={syncError} style={{width:10,height:10,borderRadius:"50%",background:"#ef4444",cursor:"help"}}/>
          )}
          {!syncing && !syncError && (
            <div style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:"#22c55e"}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:"#22c55e"}}/>
              Synchronisé
            </div>
          )}
          <button onClick={handleReload} title="Recharger depuis SharePoint"
            style={{background:"transparent",border:"none",cursor:"pointer",color:"#3d5a78",padding:"4px",display:"flex"}}>
            <Ico n="Refresh" sz={13}/>
          </button>
          <select value={filterMois} onChange={e=>setFilterMois(e.target.value)} style={{...IS,width:110,padding:"5px 8px"}}>
            <option>Tous</option>
            {MOIS_LIST.map(m=><option key={m}>{m}</option>)}
          </select>
          <div style={{display:"flex",alignItems:"center",gap:6,padding:"4px 10px",borderRadius:6,background:"#0b1828",border:"1px solid #172a3f"}}>
            <div style={{width:20,height:20,borderRadius:"50%",background:"linear-gradient(135deg,#0ea5e9,#6366f1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:"white"}}>
              {(user?.name||"U")[0]}
            </div>
            <span style={{fontSize:10,color:"#5a7a98",fontWeight:600,maxWidth:100,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
              {user?.name?.split(" ")[0] || "Utilisateur"}
            </span>
          </div>
          <button onClick={handleLogout} title="Déconnexion"
            style={{background:"transparent",border:"none",cursor:"pointer",color:"#3d5a78",padding:"4px",display:"flex"}}>
            <Ico n="LogOut" sz={14}/>
          </button>
        </div>
      </header>

      {/* MOBILE BOTTOM NAV */}
      <nav style={{position:"fixed",bottom:0,left:0,right:0,background:"#090f1e",borderTop:"1px solid #152333",zIndex:200,display:"flex",padding:"4px 0"}}>
        {navItems.map(({id,n,label})=>(
          <button key={id} onClick={()=>setPage(id)} style={{
            flex:1,border:"none",cursor:"pointer",padding:"8px 4px 6px",
            background:"transparent",color:page===id?"#7dd3fc":"#3d5a78",
            display:"flex",flexDirection:"column",alignItems:"center",gap:3,fontSize:9,fontWeight:700,
            borderTop:page===id?"2px solid #0ea5e9":"2px solid transparent",transition:"all 0.15s"
          }}>
            <Ico n={n} sz={18}/>{label}
          </button>
        ))}
      </nav>

      {/* SYNC ERROR BANNER */}
      {syncError && (
        <div style={{background:"#1a0a0a",borderBottom:"1px solid #ef444440",padding:"8px 20px",fontSize:11,color:"#ef4444",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          ⚠️ Erreur de synchronisation SharePoint : {syncError}
          <button onClick={()=>setSyncError(null)} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",marginLeft:12}}>✕</button>
        </div>
      )}

      <main style={{padding:"16px 16px 80px"}}>
        {page==="dashboard"    && <DashboardPage filt={filt} totalB={totalB} totalH={totalH} totalCR={totalCR} totalCS={totalCS} avgTRS={avgTRS} ecart={ecart} byMois={byMois} byPoste={byPoste}/>}
        {page==="saisie"       && <SaisiePage entries={entries} saveEntries={saveEntries} filterMois={filterMois} syncing={syncing}/>}
        {page==="planning"     && <PlanningPage besoins={besoins} setBesoins={setBesoins} planCfg={planCfg} setPlanCfg={setPlanCfg} planResults={planResults} nbJours={nbJours} setNbJours={setNbJours}/>}
        {page==="implantation" && <ImplantationPage planResults={planResults}/>}
      </main>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   📈  DASHBOARD
   ══════════════════════════════════════════════════════ */
function DashboardPage({filt,totalB,totalH,totalCR,totalCS,avgTRS,ecart,byMois,byPoste}) {
  const kpis = [
    {label:"Boîtes Traitées",     val:fmt(totalB),                      sub:"unités",           n:"Package",  col:"#0ea5e9"},
    {label:"Heures Productives",  val:fmt(totalH,1)+"h",                sub:"main d'œuvre",     n:"Clock",    col:"#8b5cf6"},
    {label:"TRS Moyen",           val:fmt(avgTRS,1)+"%",                sub:"rendement synth.", n:"Zap",      col:cc(avgTRS)},
    {label:"Coût Réel Total",     val:fmt(totalCR,0),                   sub:"MAD",              n:"TrendingUp",col:"#10b981"},
    {label:"Coût Standard",       val:fmt(totalCS,0),                   sub:"MAD",              n:"Activity", col:"#06b6d4"},
    {label:"Écart Coût",          val:(ecart>=0?"+":"")+fmt(ecart,0),   sub:"MAD réel − std",   n:"Alert",    col:ecart>0?"#ef4444":"#22c55e"},

      <div style={{fontSize:12,color:"#2a4a65"}}>Commencez par saisir des opérations dans l'onglet "Saisie"</div>

  );
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:20}}>
        {kpis.map(({label,val,sub,n,col})=>(
          <div key={label} style={{...CARD,position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:col,borderRadius:"12px 12px 0 0"}}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <span style={{fontSize:9,color:"#3d5a78",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",lineHeight:1.4}}>{label}</span>
              <div style={{width:26,height:26,background:col+"1a",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <Ico n={n} sz={13} col={col}/>
              </div>
            </div>
            <div style={{fontSize:22,fontWeight:800,color:"#f1f5f9",lineHeight:1,marginBottom:2}}>{val}</div>
            <div style={{fontSize:9,color:"#3d5a78",fontWeight:600,letterSpacing:"0.06em"}}>{sub}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:16,marginBottom:16}}>
        <div style={CARD}>
          <Title n="BarChart2" col="#0ea5e9">Évolution Mensuelle — Boîtes Traitées</Title>
          <ResponsiveContainer width="100%" height={200}>
            <ComposedChart data={byMois} barCategoryGap="35%">
              <CartesianGrid strokeDasharray="3 3" stroke="#172a3f"/>
              <XAxis dataKey="m" tick={{fill:"#3d5a78",fontSize:11}} axisLine={false} tickLine={false}/>
              <YAxis yAxisId="b" tick={{fill:"#3d5a78",fontSize:11}} axisLine={false} tickLine={false}/>
              <YAxis yAxisId="h" orientation="right" tick={{fill:"#3d5a78",fontSize:11}} axisLine={false} tickLine={false}/>
              <Tooltip {...TTip}/>
              <Legend wrapperStyle={{fontSize:10,color:"#3d5a78"}}/>
              <Bar yAxisId="b" dataKey="boites" name="Boîtes" fill="#0ea5e9" radius={[4,4,0,0]}/>
              <Line yAxisId="h" type="monotone" dataKey="heures" name="Heures" stroke="#f59e0b" strokeWidth={2} dot={{fill:"#f59e0b",r:3}}/>
            </ComposedChart>
          </ResponsiveContainer>
        </div>
        <div style={CARD}>
          <Title n="Zap" col="#f59e0b">TRS Mensuel (%)</Title>
          <ResponsiveContainer width="100%" height={200}>
            <AreaChart data={byMois}>
              <defs><linearGradient id="gTRS" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#f59e0b" stopOpacity={0.35}/><stop offset="95%" stopColor="#f59e0b" stopOpacity={0}/></linearGradient></defs>
              <CartesianGrid strokeDasharray="3 3" stroke="#172a3f"/>
              <XAxis dataKey="m" tick={{fill:"#3d5a78",fontSize:11}} axisLine={false} tickLine={false}/>
              <YAxis domain={[50,100]} tick={{fill:"#3d5a78",fontSize:11}} axisLine={false} tickLine={false}/>
              <Tooltip {...TTip} formatter={v=>[v.toFixed(1)+"%","TRS"]}/>
              <Area type="monotone" dataKey="trs" stroke="#f59e0b" fill="url(#gTRS)" strokeWidth={2.5} dot={{fill:"#f59e0b",r:4,strokeWidth:0}}/>
            </AreaChart>
          </ResponsiveContainer>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <div style={CARD}>
          <Title n="TrendingUp" col="#10b981">Coût Réel vs Standard (MAD)</Title>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={byMois} barCategoryGap="28%">
              <CartesianGrid strokeDasharray="3 3" stroke="#172a3f"/>
              <XAxis dataKey="m" tick={{fill:"#3d5a78",fontSize:11}} axisLine={false} tickLine={false}/>
              <YAxis tick={{fill:"#3d5a78",fontSize:11}} axisLine={false} tickLine={false}/>
              <Tooltip {...TTip} formatter={v=>[fmt(v,0)+" MAD"]}/>
              <Legend wrapperStyle={{fontSize:10,color:"#3d5a78"}}/>
              <Bar dataKey="cr" name="Réel" fill="#ef4444" radius={[3,3,0,0]}/>
              <Bar dataKey="cs" name="Standard" fill="#22c55e" radius={[3,3,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div style={CARD}>
          <Title n="Package" col="#8b5cf6">Répartition par Poste</Title>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <ResponsiveContainer width="50%" height={200}>
              <PieChart>
                <Pie data={byPoste} dataKey="boites" cx="50%" cy="50%" outerRadius={75} innerRadius={28} paddingAngle={2}>
                  {byPoste.map((_,i)=><Cell key={i} fill={PIE_COLS[i%PIE_COLS.length]}/>)}
                </Pie>
                <Tooltip {...TTip} formatter={v=>[fmt(v)+" boîtes"]}/>
              </PieChart>
            </ResponsiveContainer>
            <div style={{flex:1}}>
              {byPoste.slice(0,8).map((x,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:7}}>
                  <div style={{width:8,height:8,borderRadius:2,background:PIE_COLS[i%PIE_COLS.length],flexShrink:0}}/>
                  <span style={{fontSize:10,color:"#5a7a98",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{x.name}</span>
                  <span style={{fontSize:10,fontWeight:700,color:"#e2e8f0"}}>{fmt(x.boites)}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   ✏️  SAISIE
   ══════════════════════════════════════════════════════ */
function SaisiePage({entries,saveEntries,filterMois,syncing}) {
  const blank={date:new Date().toLocaleDateString("fr-MA"),mois:MOIS_LIST[new Date().getMonth()],calibre:CALIBRES[0],machine:POSTES[0].nom,nbBoites:"",effectif:"",dureeH:"",details:"",operation:OPERATIONS[0]};
  const [form,   setForm]   = useState(blank);
  const [editId, setEditId] = useState(null);
  const [saved,  setSaved]  = useState(false);
  const [search, setSearch] = useState("");
  const [sortCol,setSortCol]= useState("date");
  const [sortDir,setSortDir]= useState(-1);

  const auto=()=>{
    const nb=parseFloat(form.nbBoites)||0,eff=parseFloat(form.effectif)||0,dH=parseFloat(form.dureeH)||0;
    const heOp=parseFloat((dH*eff).toFixed(2));
    const cStd=COUT_STD[form.calibre]||0.1;
    const p=POSTES.find(x=>x.nom===form.machine)||POSTES[0];
    const trs=(nb&&dH&&p.capH)?Math.min(100,parseFloat(((nb/(p.capH*dH))*100).toFixed(1))):0;
    const cBt=parseFloat((cStd*(trs<75?1.08:0.97)).toFixed(4));
    return{heOp,hPb:nb>0?parseFloat((heOp/nb).toFixed(6)):0,cBt,cStd,cTR:parseFloat((cBt*nb).toFixed(2)),cTS:parseFloat((cStd*nb).toFixed(2)),ecart:parseFloat(((cBt-cStd)*nb).toFixed(2)),trs};
  };

  const handleSubmit=()=>{
    if(!form.nbBoites||!form.effectif||!form.dureeH) return;
    const {heOp,hPb,cBt,cStd,cTR,cTS,ecart,trs}=auto();
    const dH=parseFloat(form.dureeH)||0;
    const entry={id:editId||Date.now(),...form,
      nbBoites:parseInt(form.nbBoites),effectif:parseInt(form.effectif),dureeH:dH,
      duree:`${Math.floor(dH)}h${String(Math.round((dH%1)*60)).padStart(2,"0")}`,
      heuresOp:heOp,hParBoite:hPb,coutBoite:cBt,coutStandard:cStd,
      coutTotalReel:cTR,coutTotalStandard:cTS,ecart,trs,annee:"2026"};
    saveEntries(editId?entries.map(e=>e.id===editId?entry:e):[entry,...entries]);
    setEditId(null);setForm(blank);setSaved(true);setTimeout(()=>setSaved(false),3000);
  };

  const calc=auto(),hasCalc=form.nbBoites&&form.effectif&&form.dureeH;
  const shown=entries
    .filter(e=>(filterMois==="Tous"||e.mois===filterMois)&&(!search||e.calibre.toLowerCase().includes(search.toLowerCase())||e.machine.toLowerCase().includes(search.toLowerCase())||e.date.includes(search)))
    .sort((a,b)=>(a[sortCol]>b[sortCol]?1:-1)*sortDir);

  const Col=({k,lbl})=>(
    <th onClick={()=>{setSortCol(k);setSortDir(sortCol===k?-sortDir:-1);}}
      style={{fontSize:9,color:"#3d5a78",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",padding:"0 8px 10px",textAlign:"left",borderBottom:"1px solid #172a3f",cursor:"pointer",whiteSpace:"nowrap"}}>
      {lbl}{sortCol===k?(sortDir===-1?<Ico n="ChevDown" sz={9} st={{marginLeft:2}}/>:<Ico n="ChevUp" sz={9} st={{marginLeft:2}}/>):null}
    </th>
  );

  return (
    <div style={{display:"grid",gridTemplateColumns:"380px 1fr",gap:18,alignItems:"start"}}>
      <div style={CARD}>
        <div style={{fontSize:14,fontWeight:800,color:"#f1f5f9",marginBottom:18,display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:28,height:28,background:editId?"#f59e0b1a":"#0ea5e91a",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Ico n={editId?"Edit":"Plus"} sz={13} col={editId?"#f59e0b":"#0ea5e9"}/>
          </div>
          {editId?"Modifier l'Opération":"Nouvelle Opération"}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div><label style={LS}>Date</label><input type="text" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={IS}/></div>
          <div><label style={LS}>Mois</label><select value={form.mois} onChange={e=>setForm(f=>({...f,mois:e.target.value}))} style={IS}>{MOIS_LIST.map(m=><option key={m}>{m}</option>)}</select></div>
          <div style={{gridColumn:"1/-1"}}><label style={LS}>Calibre</label><select value={form.calibre} onChange={e=>setForm(f=>({...f,calibre:e.target.value}))} style={IS}>{CALIBRES.map(c=><option key={c}>{c}</option>)}</select></div>
          <div style={{gridColumn:"1/-1"}}><label style={LS}>Machine / Poste</label><select value={form.machine} onChange={e=>setForm(f=>({...f,machine:e.target.value}))} style={IS}>{POSTES.map(p=><option key={p.id}>{p.nom}</option>)}</select></div>
          <div><label style={LS}>Nb. Boîtes</label><input type="number" value={form.nbBoites} onChange={e=>setForm(f=>({...f,nbBoites:e.target.value}))} style={IS} placeholder="0"/></div>
          <div><label style={LS}>Effectif</label><input type="number" value={form.effectif} onChange={e=>setForm(f=>({...f,effectif:e.target.value}))} style={IS} placeholder="0"/></div>
          <div><label style={LS}>Durée (heures)</label><input type="number" step="0.25" value={form.dureeH} onChange={e=>setForm(f=>({...f,dureeH:e.target.value}))} style={IS} placeholder="0.00"/></div>
          <div><label style={LS}>Opération</label><select value={form.operation} onChange={e=>setForm(f=>({...f,operation:e.target.value}))} style={IS}>{OPERATIONS.map(o=><option key={o}>{o}</option>)}</select></div>
          <div style={{gridColumn:"1/-1"}}><label style={LS}>Détails</label><input type="text" value={form.details} onChange={e=>setForm(f=>({...f,details:e.target.value}))} style={IS} placeholder="Notes..."/></div>
        </div>
        {hasCalc&&(
          <div style={{marginTop:14,background:"#060e1c",borderRadius:8,padding:12,border:"1px solid #172a3f"}}>
            <div style={{fontSize:9,color:"#3d5a78",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>Calcul Automatique</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
              {[["H×Op",calc.heOp.toFixed(2)+"h"],["H/Boîte",calc.hPb.toFixed(5)],["TRS",calc.trs.toFixed(1)+"%"],["Coût/Bt",calc.cBt.toFixed(4)+" MAD"],["Coût Réel",fmt(calc.cTR,0)+" MAD"],["Écart",(calc.ecart>=0?"+":"")+fmt(calc.ecart,0)+" MAD"]].map(([k,v],i)=>(
                <div key={i} style={{background:"#0b1828",borderRadius:6,padding:"7px 8px"}}>
                  <div style={{fontSize:9,color:"#3d5a78"}}>{k}</div>
                  <div style={{fontSize:12,fontWeight:700,color:k==="TRS"?cc(calc.trs):k==="Écart"?(calc.ecart>0?"#ef4444":"#22c55e"):"#f1f5f9"}}>{v}</div>
                </div>
              ))}
            </div>
          </div>
        )}
        <div style={{display:"flex",gap:8,marginTop:16}}>
          <BtnP onClick={handleSubmit} disabled={syncing} style={{flex:1,justifyContent:"center",opacity:syncing?0.7:1}}>

/* ══════════════════════════════════════════════════════
   📅  PLANNING

function PlanningPage({besoins,setBesoins,planCfg,setPlanCfg,planResults,nbJours,setNbJours}) {
  const totalBB=Object.values(besoins).reduce((s,n)=>s+n,0);
  const totalH=planResults.reduce((s,p)=>s+p.hb,0);
  const totalEff=planResults.reduce((s,p)=>s+(p.effBesoin||0),0);
  const enSurcharge=planResults.filter(p=>p.chg>90).length;
  const adjB=(cal,d)=>setBesoins(b=>({...b,[cal]:Math.max(0,(b[cal]||0)+d)}));
  const adjC=(id,k,d,mn,mx)=>setPlanCfg(c=>({...c,[id]:{...c[id],[k]:Math.max(mn,Math.min(mx,c[id][k]+d))}}));
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:14,marginBottom:20}}>
        {[{lbl:"Besoin Total",val:fmt(totalBB)+" boîtes",col:"#0ea5e9"},{lbl:"Heures Nécessaires",val:fmt(totalH,1)+"h",col:"#8b5cf6"},{lbl:"Effectif Global",val:fmt(totalEff)+" op.",col:"#10b981"},{lbl:"Postes en Surcharge",val:String(enSurcharge),col:enSurcharge>0?"#ef4444":"#22c55e"},{lbl:"Période Planning",val:null,col:"#f59e0b"}].map(({lbl,val,col},i)=>(
          <div key={i} style={{...CARD,borderColor:col+"30"}}>
            <div style={{fontSize:9,color:"#3d5a78",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>{lbl}</div>
            {val!==null?<div style={{fontSize:22,fontWeight:800,color:col}}>{val}</div>:
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <button onClick={()=>setNbJours(j=>Math.max(1,j-1))} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:22,height:22,borderRadius:4,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>-</button>
                <span style={{fontSize:22,fontWeight:800,color:"#f1f5f9"}}>{nbJours}j</span>
                <button onClick={()=>setNbJours(j=>Math.min(30,j+1))} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:22,height:22,borderRadius:4,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
              </div>}
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"320px 1fr",gap:18}}>
        <div style={CARD}>
          <Title n="Layers" col="#0ea5e9">Besoin en Conditionnement</Title>
          <div style={{fontSize:10,color:"#3d5a78",marginBottom:12}}>Boîtes à conditionner — <strong style={{color:"#7a9ab8"}}>{nbJours} jours</strong></div>
          {CALIBRES.map(cal=>{
            const ps=CALIBRE_POSTE[cal]||[];
            return(<div key={cal} style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:11,color:"#8aa0bc",fontWeight:600}}>{cal}</span>
                <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                  {ps.map(pid=>{const p=POSTES.find(x=>x.id===pid);return p?<span key={pid} style={{fontSize:8,padding:"1px 5px",borderRadius:3,background:p.color+"18",color:p.color,fontWeight:700}}>{p.nom.split(" ")[0]}</span>:null;})}
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <button onClick={()=>adjB(cal,-10000)} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:26,height:26,borderRadius:5,cursor:"pointer",fontSize:14,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                <input type="number" value={besoins[cal]||0} onChange={e=>setBesoins(b=>({...b,[cal]:Math.max(0,parseInt(e.target.value)||0)}))} style={{...IS,textAlign:"center",flex:1}}/>
                <button onClick={()=>adjB(cal,10000)} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:26,height:26,borderRadius:5,cursor:"pointer",fontSize:14,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
              </div>
            </div>);
          })}
          <BtnS onClick={()=>setBesoins(Object.fromEntries(CALIBRES.map(c=>[c,0])))} style={{marginTop:6,width:"100%",justifyContent:"center"}}>
            <Ico n="Refresh" sz={11}/> Réinitialiser
          </BtnS>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {planResults.map(p=>{
            const cfg=planCfg[p.id],pct=Math.min(120,p.chg),bColor=cc(p.chg),hasLoad=p.bb>0;
            return(<div key={p.id} style={{...CARD,padding:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:10,height:10,borderRadius:3,background:p.color}}/>
                  <span style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>{p.nom}</span>
                  <span style={{fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:4,background:bColor+"1a",color:bColor}}>{hasLoad?cl(p.chg):"Non affecté"}</span>
                </div>
                <span style={{fontSize:24,fontWeight:800,color:hasLoad?bColor:"#2a4a65"}}>{hasLoad?p.chg.toFixed(0)+"%":"—"}</span>
              </div>
              <div style={{background:"#0b1828",borderRadius:4,height:7,marginBottom:12,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${Math.min(100,pct)}%`,background:bColor,borderRadius:4,transition:"width 0.6s ease",opacity:hasLoad?1:0.2}}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:8}}>
                {[["BOÎTES",fmt(p.bb),"#e2e8f0"],["HEURES",p.hb+"h","#e2e8f0"],["EFF. BESOIN",p.effBesoin,"#10b981"]].map(([k,v,c])=>(
                  <div key={k} style={{background:"#060e1c",borderRadius:7,padding:"8px 10px"}}>

                    <div style={{fontSize:13,fontWeight:800,color:c}}>{v}</div>
                  </div>
                ))}
                <div style={{background:"#060e1c",borderRadius:7,padding:"8px 10px"}}>
                  <div style={{fontSize:9,color:"#3d5a78",fontWeight:700,marginBottom:4}}>H/JOUR</div>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <button onClick={()=>adjC(p.id,"heuresJ",-1,6,16)} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:18,height:18,borderRadius:3,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                    <span style={{fontSize:13,fontWeight:800,color:"#0ea5e9",minWidth:18,textAlign:"center"}}>{cfg.heuresJ}</span>
                    <button onClick={()=>adjC(p.id,"heuresJ",+1,6,16)} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:18,height:18,borderRadius:3,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                  </div>
                </div>
                <div style={{background:"#060e1c",borderRadius:7,padding:"8px 10px"}}>
                  <div style={{fontSize:9,color:"#3d5a78",fontWeight:700,marginBottom:4}}>EFFECTIF</div>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <button onClick={()=>adjC(p.id,"effectif",-1,p.effMin,p.effMax)} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:18,height:18,borderRadius:3,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                    <span style={{fontSize:13,fontWeight:800,color:"#22c55e",minWidth:18,textAlign:"center"}}>{cfg.effectif}</span>
                    <button onClick={()=>adjC(p.id,"effectif",+1,p.effMin,p.effMax)} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:18,height:18,borderRadius:3,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                  </div>
                </div>
                <div style={{background:"#060e1c",borderRadius:7,padding:"8px 10px"}}>
                  <div style={{fontSize:9,color:"#3d5a78",fontWeight:700}}>MIN/MAX</div>
                  <div style={{fontSize:12,fontWeight:700,color:"#5a7a98"}}>{p.effMin}–{p.effMax}</div>
                </div>
              </div>
            </div>);
          })}
        </div>
      </div>
    </div>
  );
}

            return(<g key={i} onMouseEnter={()=>setHovered(m.nom)} onMouseLeave={()=>setHovered(null)} style={{cursor:"pointer"}}>
              {isH&&<rect x={m.x-3} y={m.y-3} width={m.w+6} height={m.h+6} fill="none" stroke={bClr} strokeWidth="2" rx="6" opacity="0.4"/>}
              <rect x={m.x} y={m.y} width={m.w} height={m.h} fill={isH?cc(chg)+"22":(d&&chg>0?cc(chg)+"14":"#0c1828")} stroke={bClr} strokeWidth={isH?1.5:1} rx="4"/>
              {d&&chg>0&&<rect x={m.x+2} y={m.y+m.h-4} width={Math.max(2,(m.w-4)*Math.min(1,chg/100))} height="3" fill={cc(chg)} rx="1.5"/>}
              {d&&<rect x={m.x+4} y={m.y+4} width="6" height="6" fill={d.color} rx="1.5"/>}
              <text x={m.x+m.w/2} y={m.y+m.h/2+1} textAnchor="middle" dominantBaseline="middle" fill={d&&chg>0?cc(chg):"#4a6a85"} fontSize={m.w>120?"9":"8"} fontWeight="700">
                {sl.length>20?sl.slice(0,20):sl}
              </text>
              {d&&chg>0&&<text x={m.x+m.w-4} y={m.y+11} textAnchor="end" fill={cc(chg)} fontSize="8" fontWeight="800">{chg.toFixed(0)}%</text>}
            </g>);
          })}
          <text x="88" y="452" fill="#172a3f" fontSize="8" fontWeight="600" letterSpacing="0.12em">SILVER FOOD — UNITÉ CONDITIONNEMENT PSF — PLAN 2023</text>
        </svg>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
