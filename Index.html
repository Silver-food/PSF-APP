<script type="text/babel">

/* ═══════════════════ ICONS (SVG inline) ═══════════════════ */
const IC = {

  BarChart2:     [["M18 20V10"],["M12 20V4"],["M6 20v-6"]],
  MapPin:        [["M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"],["M12 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"]],
  Plus:          [["M12 5v14"],["M5 12h14"]],
  Clock:         [["M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"],["M12 6v6l4 2"]],
  Zap:           [["M13 2 3 14h9l-1 8 10-12h-9l1-8z"]],
  TrendingUp:    [["M23 6l-9.5 9.5-5-5L1 18"],["M17 6h6v6"]],
  AlertTriangle: [["M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"],["M12 9v4"],["M12 17h.01"]],
  Layers:        [["M12 2 2 7l10 5 10-5-10-5z"],["M2 17l10 5 10-5"],["M2 12l10 5 10-5"]],
  Save:          [["M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"],["M17 21v-8H7v8"],["M7 3v5h8"]],
  X:             [["M18 6 6 18"],["M6 6l12 12"]],
  CheckCircle:   [["M22 11.08V12a10 10 0 1 1-5.93-9.14"],["M22 4 12 14.01l-3-3"]],

  Search:        [["M11 17.25a6.25 6.25 0 1 0 0-12.5 6.25 6.25 0 0 0 0 12.5z"],["M16 16l4.5 4.5"]],
  RefreshCw:     [["M23 4v6h-6"],["M1 20v-6h6"],["M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"]],
  Activity:      [["M22 12h-4l-3 9L9 3l-3 9H2"]],
  Users:         [["M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"],["M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"],["M23 21v-2a4 4 0 0 0-3-3.87"],["M16 3.13a4 4 0 0 1 0 7.75"]],
  ChevronUp:     [["M18 15l-6-6-6 6"]],
  ChevronDown:   [["M6 9l6 6 6-6"]],
  Settings:      [["M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"],["M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"]],
};

const Ico = ({name, size=14, color="currentColor", style={}}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
    style={{flexShrink:0,display:"inline-block",...style}}>
    {(IC[name]||[]).map((ps,i)=>ps.map((d,j)=><path key={i+"-"+j} d={d}/>))}
  </svg>
);

/* ═══════════════════ REFERENCE DATA ═══════════════════ */
const CALIBRES = ["1/4 Club 125g","Ovaline 80g","1/6 RR 125g","Pelle 125g","Ronde 80g","Thon 160g"];

const POSTES = [
  {id:"ETU_CAS_125",nom:"Etuieuse 125g Castello",   type:"etuieuse",   effMin:5, effMax:12,capH:3200, color:"#38bdf8"},
  {id:"ETU_HER_P1", nom:"Etuieuse 80g Hermassa P1", type:"etuieuse",   effMin:5, effMax:7, capH:4500, color:"#a78bfa"},
  {id:"ETU_AIT_125",nom:"Etuieuse 125g Aitmelloul", type:"etuieuse",   effMin:5, effMax:12,capH:3000, color:"#34d399"},
  {id:"ETU_CAS_P3", nom:"Etuieuse 80g Castello P3", type:"etuieuse",   effMin:5, effMax:7, capH:4200, color:"#fbbf24"},
  {id:"ETU_HER_125",nom:"Etuieuse 125g Hermassa",   type:"etuieuse",   effMin:5, effMax:12,capH:3100, color:"#fb7185"},
  {id:"FAR_AIT",    nom:"Fardeleuse Ait Melloul",   type:"fardeleuse", effMin:3, effMax:4, capH:8000, color:"#f97316"},
  {id:"FAR_CER",    nom:"Fardeleuse Cermex",        type:"fardeleuse", effMin:6, effMax:18,capH:12000,color:"#e879f9"},
  {id:"PALET",      nom:"Palettiseur",               type:"palettiseur",effMin:2, effMax:2, capH:15000,color:"#2dd4bf"},
  {id:"CONV_MSE",   nom:"Conv. MSE Manuel",          type:"convoyeur",  effMin:24,effMax:44,capH:2500, color:"#94a3b8"},
];

const CALIBRE_POSTE = {
  "1/4 Club 125g":["ETU_CAS_125","ETU_AIT_125","FAR_AIT","PALET"],
  "Ovaline 80g":  ["ETU_HER_P1","ETU_CAS_P3","FAR_CER","PALET"],
  "1/6 RR 125g":  ["ETU_CAS_125","ETU_AIT_125","FAR_CER","PALET"],
  "Pelle 125g":   ["ETU_CAS_125","ETU_HER_125","FAR_CER","PALET"],
  "Ronde 80g":    ["ETU_HER_P1","ETU_CAS_P3","FAR_AIT","PALET"],
  "Thon 160g":    ["ETU_HER_125","FAR_CER","PALET"],
};

const COUT_STD = {
  "1/4 Club 125g":0.118,"Ovaline 80g":0.095,"1/6 RR 125g":0.125,
  "Pelle 125g":0.132,"Ronde 80g":0.088,"Thon 160g":0.145
};

const OPERATIONS = ["Mise en Etui","Fardelage","Palettisation","Marquage","Soufflage","Accumulation","Conditionnement"];
const MOIS_LIST  = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const PIE_COLS   = ["#38bdf8","#a78bfa","#34d399","#fbbf24","#fb7185","#f97316","#e879f9","#2dd4bf","#94a3b8"];

/* ═══════════════════ SAMPLE DATA ═══════════════════ */
const makeSampleData = () => {
  const d=[]; let id=1;
  [[12,"Janvier"],[15,"Février"],[20,"Mars"],[9,"Avril"]].forEach(([n,mois])=>{
    for(let i=0;i<n;i++){
      const p=POSTES[i%POSTES.length], cal=CALIBRES[i%CALIBRES.length];
      const eff=p.effMin+Math.floor(Math.random()*(p.effMax-p.effMin+1));
      const dH=parseFloat((3+Math.random()*5).toFixed(2));
      const trs=0.65+Math.random()*0.25;
      const nb=Math.floor(p.capH*dH*trs);
      const heOp=parseFloat((dH*eff).toFixed(2));
      const cStd=COUT_STD[cal]||0.1;
      const cBt=parseFloat((cStd*(0.88+Math.random()*0.24)).toFixed(4));
      d.push({id:id++,
        date:`${String(i+1).padStart(2,"0")}/${String(MOIS_LIST.indexOf(mois)+1).padStart(2,"0")}/2026`,
        mois,annee:"2026",calibre:cal,machine:p.nom,
        nbBoites:nb,effectif:eff,
        duree:`${Math.floor(dH)}h${String(Math.round((dH%1)*60)).padStart(2,"0")}`,
        dureeH:dH,heuresOp:heOp,
        hParBoite:nb>0?parseFloat((heOp/nb).toFixed(6)):0,
        coutBoite:cBt,coutStandard:cStd,
        coutTotalReel:parseFloat((cBt*nb).toFixed(2)),
        coutTotalStandard:parseFloat((cStd*nb).toFixed(2)),
        ecart:parseFloat(((cBt-cStd)*nb).toFixed(2)),
        details:OPERATIONS[i%OPERATIONS.length],
        trs:parseFloat((trs*100).toFixed(1))
      });
    }
  });
  return d;
};

/* ═══════════════════ HELPERS ═══════════════════ */
const fmt  = (n,d=0) => (typeof n==="number"?n:0).toLocaleString("fr-MA",{minimumFractionDigits:d,maximumFractionDigits:d});
const cc   = pct => pct<70?"#22c55e":pct<90?"#f59e0b":"#ef4444";
const cl   = pct => pct<70?"Normal":pct<90?"Attention":"Critique";

const IS   = {background:"#06101e",border:"1px solid #18304a",color:"#e2e8f0",padding:"8px 10px",borderRadius:6,fontSize:12,width:"100%",boxSizing:"border-box",outline:"none"};
const LS   = {fontSize:9,color:"#3d5a78",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",display:"block",marginBottom:3};
const CARD = {background:"#0b1828",border:"1px solid #172a3f",borderRadius:12,padding:20};
const TD   = {padding:"7px 8px",fontSize:11,color:"#b8ccd8",borderBottom:"1px solid #0f1c2e"};

const BtnP = (props) => (
  <button {...props} style={{background:"linear-gradient(135deg,#0ea5e9,#6366f1)",border:"none",color:"white",padding:"9px 14px",borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",gap:5,...props.style}}/>
);
const BtnS = (props) => (
  <button {...props} style={{background:"#172a3f",border:"1px solid #1e3a54",color:"#7a9ab8",padding:"7px 11px",borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:5,...props.style}}/>
);
const Title = ({icon:name, color="#7a9ab8", children}) => (
  <div style={{fontSize:12,fontWeight:700,color:"#7a9ab8",marginBottom:14,display:"flex",alignItems:"center",gap:6}}>
    {name && <Ico name={name} size={13} color={color}/>}{children}
  </div>
);
const TTip = {contentStyle:{background:"#0b1828",border:"1px solid #172a3f",borderRadius:8,color:"#e2e8f0",fontSize:11}};

/* ═══════════════════ CSV EXPORT ═══════════════════ */
const exportCSV = (entries) => {
  const headers = ["Date","Mois","Calibre","Machine","Nb Boîtes","Effectif","Durée (h)","Heures×Op","H/Boîte","TRS%","Coût/Boîte","Coût Std","Coût Total Réel","Coût Total Std","Écart","Détails"];
  const rows = entries.map(e=>[
    e.date,e.mois,e.calibre,e.machine,e.nbBoites,e.effectif,e.dureeH,e.heuresOp,
    e.hParBoite,e.trs,e.coutBoite,e.coutStandard,e.coutTotalReel,e.coutTotalStandard,e.ecart,e.details||""
  ]);
  const csv = [headers,...rows].map(r=>r.join(";")).join("\n");
  const blob = new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href=url; a.download=`PSF_TRS_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
};

/* ═══════════════════ MAIN APP ═══════════════════ */
function App() {
  const [page,      setPage]      = useState("dashboard");
  const [entries,   setEntries]   = useState(makeSampleData);
  const [filterMois,setFilterMois]= useState("Tous");
  const [besoins,   setBesoins]   = useState(Object.fromEntries(CALIBRES.map(c=>[c,0])));
  const [planCfg,   setPlanCfg]   = useState(Object.fromEntries(POSTES.map(p=>[p.id,{heuresJ:8,effectif:p.effMin}])));
  const [nbJours,   setNbJours]   = useState(5);

  useEffect(()=>{
    try{ const s=localStorage.getItem("psf-sfo-v2"); if(s) setEntries(JSON.parse(s)); }catch{}
  },[]);

  const saveEntries = (ne) => {
    setEntries(ne);
    try{ localStorage.setItem("psf-sfo-v2",JSON.stringify(ne)); }catch{}
  };

  const filt    = filterMois==="Tous"?entries:entries.filter(e=>e.mois===filterMois);
  const totalB  = filt.reduce((s,e)=>s+e.nbBoites,0);
  const totalH  = filt.reduce((s,e)=>s+e.heuresOp,0);
  const totalCR = filt.reduce((s,e)=>s+e.coutTotalReel,0);
  const totalCS = filt.reduce((s,e)=>s+e.coutTotalStandard,0);
  const avgTRS  = filt.length?filt.reduce((s,e)=>s+(e.trs||75),0)/filt.length:0;
  const ecart   = totalCR-totalCS;

  const byMois = MOIS_LIST.slice(0,4).map(m=>{
    const me=entries.filter(e=>e.mois===m);
    return{m:m.slice(0,4),
      boites:me.reduce((s,e)=>s+e.nbBoites,0),
      heures:parseFloat(me.reduce((s,e)=>s+e.heuresOp,0).toFixed(1)),
      cr:Math.round(me.reduce((s,e)=>s+e.coutTotalReel,0)),
      cs:Math.round(me.reduce((s,e)=>s+e.coutTotalStandard,0)),
      trs:me.length?parseFloat((me.reduce((s,e)=>s+(e.trs||75),0)/me.length).toFixed(1)):0
    };
  });

  const byPoste = POSTES.map(p=>{
    const pe=filt.filter(e=>e.machine===p.nom);
    return{name:p.nom.replace("Etuieuse ","Etu. ").replace("Fardeleuse ","Fard. "),boites:pe.reduce((s,e)=>s+e.nbBoites,0),color:p.color};
  }).filter(x=>x.boites>0);

  const planResults = POSTES.map(p=>{
    const cfg=planCfg[p.id];
    const bb=CALIBRES.reduce((s,c)=>(CALIBRE_POSTE[c]?.includes(p.id)?s+(besoins[c]||0):s),0);
    const cap=p.capH*cfg.heuresJ*nbJours;
    const chg=cap>0?parseFloat(((bb/cap)*100).toFixed(1)):0;
    const hb=p.capH>0?parseFloat((bb/p.capH).toFixed(1)):0;
    const effBesoin=hb>0?Math.max(p.effMin,Math.min(p.effMax,Math.ceil(hb/cfg.heuresJ))):0;
    return{...p,bb:Math.floor(bb),hb,chg,effBesoin,cfg};
  });

  const navItems = [
    {id:"dashboard",   icon:"BarChart2",label:"Dashboard"},
    {id:"saisie",      icon:"Plus",     label:"Saisie"},
    {id:"planning",    icon:"Layers",   label:"Planning"},
    {id:"implantation",icon:"MapPin",   label:"Implantation"},
  ];

  return (
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",background:"#050c18",minHeight:"100vh",color:"#e2e8f0"}}>

      {/* HEADER */}
      <header style={{background:"#090f1e",borderBottom:"1px solid #152333",display:"flex",alignItems:"center",padding:"0 16px",height:56,position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          <div style={{width:32,height:32,background:"linear-gradient(135deg,#0ea5e9,#6366f1)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Ico name="Package" size={17} color="white"/>
          </div>
          <div>
            <div style={{fontSize:12,fontWeight:800,color:"#f1f5f9",letterSpacing:"0.06em"}}>PSF CONDITIONNEMENT</div>
            <div style={{fontSize:8,color:"#2a4a65",letterSpacing:"0.12em",fontWeight:700}}>SILVER FOOD</div>
          </div>
        </div>
        <nav style={{display:"flex",gap:2,marginLeft:24,flex:1}}>
          {navItems.map(({id,icon,label})=>(
            <button key={id} onClick={()=>setPage(id)} style={{
              padding:"6px 12px",borderRadius:6,border:"none",cursor:"pointer",
              background:page===id?"rgba(14,165,233,0.12)":"transparent",
              color:page===id?"#7dd3fc":"#3d5a78",
              fontSize:11,fontWeight:700,display:"flex",alignItems:"center",gap:5,
              borderBottom:page===id?"2px solid #0ea5e9":"2px solid transparent",transition:"all 0.15s"
            }}>
              <Ico name={icon} size={13}/>{label}
            </button>
          ))}
        </nav>
        <select value={filterMois} onChange={e=>setFilterMois(e.target.value)} style={{...IS,width:120,padding:"5px 8px"}}>
          <option>Tous</option>
          {MOIS_LIST.map(m=><option key={m}>{m}</option>)}
        </select>
      </header>

      {/* MOBILE BOTTOM NAV */}
      <nav style={{position:"fixed",bottom:0,left:0,right:0,background:"#090f1e",borderTop:"1px solid #152333",zIndex:200,display:"flex",padding:"4px 0"}}>
        {navItems.map(({id,icon,label})=>(
          <button key={id} onClick={()=>setPage(id)} style={{
            flex:1,border:"none",cursor:"pointer",padding:"8px 4px 6px",
            background:"transparent",
            color:page===id?"#7dd3fc":"#3d5a78",
            display:"flex",flexDirection:"column",alignItems:"center",gap:3,fontSize:9,fontWeight:700,
            borderTop:page===id?"2px solid #0ea5e9":"2px solid transparent",transition:"all 0.15s"
          }}>
            <Ico name={icon} size={18}/>{label}
          </button>
        ))}
      </nav>

      <main style={{padding:"16px 16px 80px"}}>
        {page==="dashboard"    && <DashboardPage filt={filt} totalB={totalB} totalH={totalH} totalCR={totalCR} totalCS={totalCS} avgTRS={avgTRS} ecart={ecart} byMois={byMois} byPoste={byPoste}/>}
        {page==="saisie"       && <SaisiePage entries={entries} saveEntries={saveEntries} filterMois={filterMois} onExport={()=>exportCSV(entries)}/>}
        {page==="planning"     && <PlanningPage besoins={besoins} setBesoins={setBesoins} planCfg={planCfg} setPlanCfg={setPlanCfg} planResults={planResults} nbJours={nbJours} setNbJours={setNbJours}/>}
        {page==="implantation" && <ImplantationPage planResults={planResults}/>}
      </main>
    </div>
  );
}

/* ══════════════════════════════════════════════
   DASHBOARD
══════════════════════════════════════════════ */
function DashboardPage({filt,totalB,totalH,totalCR,totalCS,avgTRS,ecart,byMois,byPoste}) {
  const kpis = [
    {label:"Boîtes Traitées",    val:fmt(totalB),                                 sub:"unités",           icon:"Package",       color:"#0ea5e9"},
    {label:"Heures Productives", val:fmt(totalH,1)+"h",                           sub:"main d'œuvre",     icon:"Clock",         color:"#8b5cf6"},
    {label:"TRS Moyen",          val:fmt(avgTRS,1)+"%",                           sub:"rendement synth.", icon:"Zap",           color:cc(avgTRS)},
    {label:"Coût Réel Total",    val:fmt(totalCR,0),                              sub:"MAD",              icon:"TrendingUp",    color:"#10b981"},
    {label:"Coût Standard",      val:fmt(totalCS,0),                              sub:"MAD",              icon:"Activity",      color:"#06b6d4"},
    {label:"Écart Coût",         val:(ecart>=0?"+":"")+fmt(ecart,0),              sub:"MAD réel − std",   icon:"AlertTriangle", color:ecart>0?"#ef4444":"#22c55e"},
  ];
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:20}}>
        {kpis.map(({label,val,sub,icon,color})=>(
          <div key={label} style={{...CARD,position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:color,borderRadius:"12px 12px 0 0"}}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <span style={{fontSize:9,color:"#3d5a78",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",lineHeight:1.4}}>{label}</span>
              <div style={{width:26,height:26,background:color+"1a",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <Ico name={icon} size={13} color={color}/>
              </div>
            </div>
            <div style={{fontSize:22,fontWeight:800,color:"#f1f5f9",lineHeight:1,marginBottom:2}}>{val}</div>
            <div style={{fontSize:9,color:"#3d5a78",fontWeight:600,letterSpacing:"0.06em"}}>{sub}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:16,marginBottom:16}}>
        <div style={CARD}>
          <Title icon="BarChart2" color="#0ea5e9">Évolution Mensuelle — Boîtes Traitées</Title>
          <ResponsiveContainer width="100%" height={200}>
            <ComposedChart data={byMois} barCategoryGap="35%">
              <CartesianGrid strokeDasharray="3 3" stroke="#172a3f"/>

              <YAxis yAxisId="b" tick={{fill:"#3d5a78",fontSize:11}} axisLine={false} tickLine={false}/>

              <XAxis dataKey="m" tick={{fill:"#3d5a78",fontSize:11}} axisLine={false} tickLine={false}/>
              <YAxis domain={[55,100]} tick={{fill:"#3d5a78",fontSize:11}} axisLine={false} tickLine={false}/>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <div style={CARD}>

            <BarChart data={byMois} barCategoryGap="28%">
              <CartesianGrid strokeDasharray="3 3" stroke="#172a3f"/>
              <XAxis dataKey="m" tick={{fill:"#3d5a78",fontSize:11}} axisLine={false} tickLine={false}/>
              <YAxis tick={{fill:"#3d5a78",fontSize:11}} axisLine={false} tickLine={false}/>

              <Legend wrapperStyle={{fontSize:10,color:"#3d5a78"}}/>

              <Bar dataKey="cs" name="Standard" fill="#22c55e" radius={[3,3,0,0]}/>

        </div>
        <div style={CARD}>
          <Title icon="Package" color="#8b5cf6">Répartition par Poste</Title>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <ResponsiveContainer width="50%" height={200}>
              <PieChart>
                <Pie data={byPoste} dataKey="boites" cx="50%" cy="50%" outerRadius={75} innerRadius={28} paddingAngle={2}>
                  {byPoste.map((_,i)=><Cell key={i} fill={PIE_COLS[i%PIE_COLS.length]}/>)}

      </div>

}

/* ══════════════════════════════════════════════
   SAISIE
══════════════════════════════════════════════ */
function SaisiePage({entries,saveEntries,filterMois,onExport}) {
  const blank = {
    date:new Date().toLocaleDateString("fr-MA").replace(/\//g,"/"),
    mois:MOIS_LIST[new Date().getMonth()],
    calibre:CALIBRES[0],machine:POSTES[0].nom,
    nbBoites:"",effectif:"",dureeH:"",details:"",operation:OPERATIONS[0]
  };
  const [form,   setForm]   = useState(blank);
  const [editId, setEditId] = useState(null);
  const [saved,  setSaved]  = useState(false);
  const [search, setSearch] = useState("");
  const [sortCol,setSortCol]= useState("id");
  const [sortDir,setSortDir]= useState(-1);

  const auto = () => {
    const nb=parseFloat(form.nbBoites)||0, eff=parseFloat(form.effectif)||0, dH=parseFloat(form.dureeH)||0;
    const heOp=parseFloat((dH*eff).toFixed(2));
    const cStd=COUT_STD[form.calibre]||0.1;
    const poste=POSTES.find(p=>p.nom===form.machine)||POSTES[0];
    const trs=(nb&&dH&&poste.capH)?Math.min(100,parseFloat(((nb/(poste.capH*dH))*100).toFixed(1))):0;
    const cBt=parseFloat((cStd*(trs<75?1.08:0.97)).toFixed(4));
    return{heOp,hPb:nb>0?parseFloat((heOp/nb).toFixed(6)):0,cBt,cStd,
      cTR:parseFloat((cBt*nb).toFixed(2)),cTS:parseFloat((cStd*nb).toFixed(2)),
      ecart:parseFloat(((cBt-cStd)*nb).toFixed(2)),trs};
  };

  const handleSubmit = () => {
    if(!form.nbBoites||!form.effectif||!form.dureeH) return;
    const {heOp,hPb,cBt,cStd,cTR,cTS,ecart,trs}=auto();
    const dH=parseFloat(form.dureeH)||0;
    const entry={id:editId||Date.now(),...form,
      nbBoites:parseInt(form.nbBoites),effectif:parseInt(form.effectif),dureeH:dH,
      duree:`${Math.floor(dH)}h${String(Math.round((dH%1)*60)).padStart(2,"0")}`,
      heuresOp:heOp,hParBoite:hPb,coutBoite:cBt,coutStandard:cStd,
      coutTotalReel:cTR,coutTotalStandard:cTS,ecart,trs};
    saveEntries(editId?entries.map(e=>e.id===editId?entry:e):[entry,...entries]);
    setEditId(null);setForm(blank);setSaved(true);setTimeout(()=>setSaved(false),2500);
  };

  const calc=auto(), hasCalc=form.nbBoites&&form.effectif&&form.dureeH;

  const shown=entries
    .filter(e=>(filterMois==="Tous"||e.mois===filterMois)&&
      (!search||e.calibre.toLowerCase().includes(search.toLowerCase())||
       e.machine.toLowerCase().includes(search.toLowerCase())||e.date.includes(search)))
    .sort((a,b)=>(a[sortCol]>b[sortCol]?1:-1)*sortDir);

  const Col=({k,label})=>(
    <th onClick={()=>{setSortCol(k);setSortDir(sortCol===k?-sortDir:-1);}}
      style={{fontSize:9,color:"#3d5a78",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",padding:"0 8px 10px",textAlign:"left",borderBottom:"1px solid #172a3f",cursor:"pointer",whiteSpace:"nowrap"}}>
      {label}{sortCol===k?(sortDir===-1?<Ico name="ChevronDown" size={9} style={{marginLeft:2}}/>:<Ico name="ChevronUp" size={9} style={{marginLeft:2}}/>):null}
    </th>
  );

  return (
    <div style={{display:"grid",gridTemplateColumns:"380px 1fr",gap:18,alignItems:"start"}}>
      {/* FORM */}
      <div style={CARD}>
        <div style={{fontSize:14,fontWeight:800,color:"#f1f5f9",marginBottom:18,display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:28,height:28,background:editId?"#f59e0b1a":"#0ea5e91a",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Ico name={editId?"Edit2":"Plus"} size={13} color={editId?"#f59e0b":"#0ea5e9"}/>
          </div>
          {editId?"Modifier l'Opération":"Nouvelle Opération"}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div><label style={LS}>Date</label><input type="text" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={IS} placeholder="jj/mm/aaaa"/></div>
          <div><label style={LS}>Mois</label>
            <select value={form.mois} onChange={e=>setForm(f=>({...f,mois:e.target.value}))} style={IS}>
              {MOIS_LIST.map(m=><option key={m}>{m}</option>)}
            </select>
          </div>
          <div style={{gridColumn:"1/-1"}}><label style={LS}>Calibre</label>
            <select value={form.calibre} onChange={e=>setForm(f=>({...f,calibre:e.target.value}))} style={IS}>
              {CALIBRES.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div style={{gridColumn:"1/-1"}}><label style={LS}>Machine / Poste</label>
            <select value={form.machine} onChange={e=>setForm(f=>({...f,machine:e.target.value}))} style={IS}>
              {POSTES.map(p=><option key={p.id}>{p.nom}</option>)}
            </select>
          </div>
          <div><label style={LS}>Nb. Boîtes</label><input type="number" value={form.nbBoites} onChange={e=>setForm(f=>({...f,nbBoites:e.target.value}))} style={IS} placeholder="0"/></div>
          <div><label style={LS}>Effectif</label><input type="number" value={form.effectif} onChange={e=>setForm(f=>({...f,effectif:e.target.value}))} style={IS} placeholder="0"/></div>
          <div><label style={LS}>Durée (heures)</label><input type="number" step="0.25" value={form.dureeH} onChange={e=>setForm(f=>({...f,dureeH:e.target.value}))} style={IS} placeholder="0.00"/></div>
          <div><label style={LS}>Opération</label>
            <select value={form.operation} onChange={e=>setForm(f=>({...f,operation:e.target.value}))} style={IS}>
              {OPERATIONS.map(o=><option key={o}>{o}</option>)}
            </select>
          </div>
          <div style={{gridColumn:"1/-1"}}><label style={LS}>Détails</label>
            <input type="text" value={form.details} onChange={e=>setForm(f=>({...f,details:e.target.value}))} style={IS} placeholder="Notes..."/>
          </div>
        </div>
        {hasCalc&&(
          <div style={{marginTop:14,background:"#060e1c",borderRadius:8,padding:12,border:"1px solid #172a3f"}}>
            <div style={{fontSize:9,color:"#3d5a78",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>Calcul Automatique</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
              {[["H×Op",calc.heOp.toFixed(2)+"h"],["H/Boîte",calc.hPb.toFixed(5)],["TRS",calc.trs.toFixed(1)+"%"],
                ["Coût/Bt",calc.cBt.toFixed(4)+" MAD"],["Coût Réel",fmt(calc.cTR,0)+" MAD"],
                ["Écart",(calc.ecart>=0?"+":"")+fmt(calc.ecart,0)+" MAD"]
              ].map(([k,v],i)=>(
                <div key={i} style={{background:"#0b1828",borderRadius:6,padding:"7px 8px"}}>
                  <div style={{fontSize:9,color:"#3d5a78"}}>{k}</div>
                  <div style={{fontSize:12,fontWeight:700,color:k==="TRS"?cc(calc.trs):k==="Écart"?(calc.ecart>0?"#ef4444":"#22c55e"):"#f1f5f9"}}>{v}</div>
                </div>
              ))}
            </div>
          </div>
        )}
        <div style={{display:"flex",gap:8,marginTop:16}}>
          <BtnP onClick={handleSubmit} style={{flex:1,justifyContent:"center"}}>
            <Ico name="Save" size={13}/> {editId?"Modifier":"Enregistrer"}
          </BtnP>
          {editId&&<BtnS onClick={()=>{setEditId(null);setForm(blank);}}><Ico name="X" size={13}/></BtnS>}
        </div>
        {saved&&<div style={{marginTop:10,display:"flex",alignItems:"center",gap:6,color:"#22c55e",fontSize:11,fontWeight:700}}><Ico name="CheckCircle" size={13} color="#22c55e"/> Enregistré !</div>}
      </div>

      {/* TABLE */}
      <div style={CARD}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
          <div style={{fontSize:14,fontWeight:800,color:"#f1f5f9"}}>
            Historique <span style={{fontSize:11,color:"#3d5a78",fontWeight:500}}>({shown.length} entrée{shown.length>1?"s":""})</span>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <div style={{position:"relative"}}>
              <Ico name="Search" size={11} style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",color:"#3d5a78"}}/>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher..." style={{...IS,paddingLeft:26,width:160}}/>
            </div>
            <BtnS onClick={onExport}><Ico name="RefreshCw" size={11}/> Export CSV</BtnS>
          </div>
        </div>
        <div style={{overflowX:"auto",maxHeight:460,overflowY:"auto"}}>
          <table style={{width:"100%",borderCollapse:"separate",borderSpacing:"0 2px"}}>
            <thead style={{position:"sticky",top:0,background:"#0b1828",zIndex:1}}>
              <tr>
                <Col k="date"          label="Date"/>
                <Col k="calibre"       label="Calibre"/>
                <Col k="machine"       label="Poste"/>
                <Col k="nbBoites"      label="Boîtes"/>
                <Col k="effectif"      label="Eff."/>
                <Col k="dureeH"        label="Durée"/>
                <Col k="trs"           label="TRS%"/>
                <Col k="coutTotalReel" label="Coût Réel"/>
                <Col k="ecart"         label="Écart"/>
                <th style={{fontSize:9,color:"#3d5a78",fontWeight:700,textTransform:"uppercase",padding:"0 8px 10px",borderBottom:"1px solid #172a3f"}}>Act.</th>
              </tr>
            </thead>
            <tbody>
              {shown.slice(0,50).map(e=>{
                const poste=POSTES.find(p=>p.nom===e.machine);
                return(
                  <tr key={e.id} style={{background:"#070d1a"}}>
                    <td style={TD}>{e.date}</td>
                    <td style={TD}><span style={{background:"#172a3f",padding:"2px 6px",borderRadius:4,fontSize:10,fontWeight:600,color:"#7ab8d8"}}>{e.calibre}</span></td>
                    <td style={{...TD,maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {poste&&<span style={{display:"inline-block",width:6,height:6,borderRadius:2,background:poste.color,marginRight:5}}/>}
                      {e.machine}
                    </td>
                    <td style={{...TD,fontWeight:700,color:"#f1f5f9"}}>{fmt(e.nbBoites)}</td>
                    <td style={TD}>{e.effectif}</td>
                    <td style={TD}>{e.duree}</td>
                    <td style={{...TD,fontWeight:700,color:cc(e.trs)}}>{e.trs}%</td>
                    <td style={TD}>{fmt(e.coutTotalReel,0)}</td>
                    <td style={{...TD,fontWeight:700,color:e.ecart>0?"#ef4444":"#22c55e"}}>{e.ecart>0?"+":""}{fmt(e.ecart,0)}</td>
                    <td style={TD}>
                      <div style={{display:"flex",gap:4}}>
                        <button onClick={()=>{setEditId(e.id);setForm({date:e.date,mois:e.mois,calibre:e.calibre,machine:e.machine,nbBoites:String(e.nbBoites),effectif:String(e.effectif),dureeH:String(e.dureeH),details:e.details||"",operation:e.details||OPERATIONS[0]});}}
                          style={{background:"#172a3f",border:"none",borderRadius:4,padding:"4px 6px",cursor:"pointer",color:"#7a9ab8"}}><Ico name="Edit2" size={11} color="#7a9ab8"/></button>
                        <button onClick={()=>saveEntries(entries.filter(x=>x.id!==e.id))}
                          style={{background:"#1f1020",border:"none",borderRadius:4,padding:"4px 6px",cursor:"pointer",color:"#ef4444"}}><Ico name="Trash2" size={11} color="#ef4444"/></button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   PLANNING
══════════════════════════════════════════════ */
function PlanningPage({besoins,setBesoins,planCfg,setPlanCfg,planResults,nbJours,setNbJours}) {
  const totalBB=Object.values(besoins).reduce((s,n)=>s+n,0);
  const totalH=planResults.reduce((s,p)=>s+p.hb,0);
  const totalEff=planResults.reduce((s,p)=>s+(p.effBesoin||0),0);
  const enSurcharge=planResults.filter(p=>p.chg>90).length;
  const adjBesoin=(cal,delta)=>setBesoins(b=>({...b,[cal]:Math.max(0,(b[cal]||0)+delta)}));
  const adjCfg=(id,key,delta,min,max)=>setPlanCfg(c=>({...c,[id]:{...c[id],[key]:Math.max(min,Math.min(max,c[id][key]+delta))}}));

  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:14,marginBottom:20}}>
        {[
          {label:"Besoin Total",        val:fmt(totalBB)+" boîtes",color:"#0ea5e9"},
          {label:"Heures Nécessaires",  val:fmt(totalH,1)+"h",     color:"#8b5cf6"},
          {label:"Effectif Global",     val:fmt(totalEff)+" op.",   color:"#10b981"},
          {label:"Postes en Surcharge", val:String(enSurcharge),   color:enSurcharge>0?"#ef4444":"#22c55e"},
          {label:"Période Planning",    val:null,                   color:"#f59e0b"},
        ].map(({label,val,color},i)=>(
          <div key={i} style={{...CARD,borderColor:color+"30"}}>
            <div style={{fontSize:9,color:"#3d5a78",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>{label}</div>
            {val!==null
              ? <div style={{fontSize:22,fontWeight:800,color}}>{val}</div>
              : <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <button onClick={()=>setNbJours(j=>Math.max(1,j-1))} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:22,height:22,borderRadius:4,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>-</button>
                  <span style={{fontSize:22,fontWeight:800,color:"#f1f5f9"}}>{nbJours}j</span>
                  <button onClick={()=>setNbJours(j=>Math.min(30,j+1))} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:22,height:22,borderRadius:4,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                </div>
            }
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"320px 1fr",gap:18}}>
        <div style={CARD}>
          <Title icon="Layers" color="#0ea5e9">Besoin en Conditionnement</Title>
          <div style={{fontSize:10,color:"#3d5a78",marginBottom:12,lineHeight:1.5}}>
            Boîtes à conditionner par calibre — <strong style={{color:"#7a9ab8"}}>{nbJours} jours</strong>
          </div>
          {CALIBRES.map(cal=>{
            const postes=CALIBRE_POSTE[cal]||[];
            return(
              <div key={cal} style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:11,color:"#8aa0bc",fontWeight:600}}>{cal}</span>
                  <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                    {postes.map(pid=>{const p=POSTES.find(x=>x.id===pid);return p?<span key={pid} style={{fontSize:8,padding:"1px 5px",borderRadius:3,background:p.color+"18",color:p.color,fontWeight:700}}>{p.nom.split(" ")[0]}</span>:null;})}
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <button onClick={()=>adjBesoin(cal,-10000)} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:26,height:26,borderRadius:5,cursor:"pointer",fontSize:14,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                  <input type="number" value={besoins[cal]||0} onChange={e=>setBesoins(b=>({...b,[cal]:Math.max(0,parseInt(e.target.value)||0)}))} style={{...IS,textAlign:"center",flex:1}}/>
                  <button onClick={()=>adjBesoin(cal,10000)} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:26,height:26,borderRadius:5,cursor:"pointer",fontSize:14,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                </div>
              </div>
            );
          })}
          <BtnS onClick={()=>setBesoins(Object.fromEntries(CALIBRES.map(c=>[c,0])))} style={{marginTop:6,width:"100%",justifyContent:"center"}}>
            <Ico name="RefreshCw" size={11}/> Réinitialiser
          </BtnS>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div style={{...CARD,padding:"14px 20px"}}>
            <Title icon="Settings" color="#8b5cf6">Charge par Poste — Actions Disponibles</Title>
          </div>
          {planResults.map(p=>{
            const cfg=planCfg[p.id], pct=Math.min(120,p.chg), bColor=cc(p.chg), hasLoad=p.bb>0;
            return(
              <div key={p.id} style={{...CARD,padding:16}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:10,height:10,borderRadius:3,background:p.color}}/>
                    <span style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>{p.nom}</span>
                    <span style={{fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:4,background:bColor+"1a",color:bColor}}>{hasLoad?cl(p.chg):"Non affecté"}</span>
                    <span style={{fontSize:9,color:"#3d5a78",fontWeight:600}}>Cap.: {fmt(p.capH)} boîtes/h</span>
                  </div>
                  <span style={{fontSize:24,fontWeight:800,color:hasLoad?bColor:"#2a4a65"}}>{hasLoad?p.chg.toFixed(0)+"%":"—"}</span>
                </div>
                <div style={{background:"#0b1828",borderRadius:4,height:7,marginBottom:12,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${Math.min(100,pct)}%`,background:bColor,borderRadius:4,transition:"width 0.6s ease",opacity:hasLoad?1:0.2}}/>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:8}}>
                  {[["BOÎTES",fmt(p.bb),"#e2e8f0"],["HEURES",p.hb+"h","#e2e8f0"],["EFF. BESOIN",p.effBesoin,"#10b981"]].map(([k,v,c])=>(
                    <div key={k} style={{background:"#060e1c",borderRadius:7,padding:"8px 10px"}}>
                      <div style={{fontSize:9,color:"#3d5a78",fontWeight:700,letterSpacing:"0.06em"}}>{k}</div>
                      <div style={{fontSize:13,fontWeight:800,color:c}}>{v}</div>
                    </div>
                  ))}
                  <div style={{background:"#060e1c",borderRadius:7,padding:"8px 10px"}}>
                    <div style={{fontSize:9,color:"#3d5a78",fontWeight:700,letterSpacing:"0.06em",marginBottom:4}}>H/JOUR</div>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <button onClick={()=>adjCfg(p.id,"heuresJ",-1,6,16)} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:18,height:18,borderRadius:3,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                      <span style={{fontSize:13,fontWeight:800,color:"#0ea5e9",minWidth:18,textAlign:"center"}}>{cfg.heuresJ}</span>
                      <button onClick={()=>adjCfg(p.id,"heuresJ",+1,6,16)} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:18,height:18,borderRadius:3,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                    </div>
                  </div>
                  <div style={{background:"#060e1c",borderRadius:7,padding:"8px 10px"}}>
                    <div style={{fontSize:9,color:"#3d5a78",fontWeight:700,letterSpacing:"0.06em",marginBottom:4}}>EFFECTIF</div>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <button onClick={()=>adjCfg(p.id,"effectif",-1,p.effMin,p.effMax)} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:18,height:18,borderRadius:3,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                      <span style={{fontSize:13,fontWeight:800,color:"#22c55e",minWidth:18,textAlign:"center"}}>{cfg.effectif}</span>
                      <button onClick={()=>adjCfg(p.id,"effectif",+1,p.effMin,p.effMax)} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:18,height:18,borderRadius:3,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                    </div>
                  </div>
                  <div style={{background:"#060e1c",borderRadius:7,padding:"8px 10px"}}>
                    <div style={{fontSize:9,color:"#3d5a78",fontWeight:700,letterSpacing:"0.06em"}}>MIN/MAX</div>
                    <div style={{fontSize:12,fontWeight:700,color:"#5a7a98"}}>{p.effMin}–{p.effMax} op.</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}
