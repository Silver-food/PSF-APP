<script type="text/babel">
try {

/* ══════ CONFIG ══════ */
const CONFIG = {
  clientId:    "bd36d1f6-834c-4e79-a7ef-9ef988e38359",
  tenantId:    "5c47add6-913a-41a7-9f2a-551fcaa9f602",
  siteHost:    "silverfood0.sharepoint.com",
  sitePath:    "/sites/mprSFO",

/* ══════ MSAL ══════ */
const msalInstance = new msal.PublicClientApplication({
  auth: {
    clientId:    CONFIG.clientId,
    authority:  `https://login.microsoftonline.com/${CONFIG.tenantId}`,
    redirectUri: CONFIG.redirectUri,
  },
  cache: { cacheLocation: "sessionStorage", storeAuthStateInCookie: false },
});

const SCOPES = ["Files.ReadWrite.All", "Sites.ReadWrite.All"];
let _msalReady = false;

const msalInit = async () => {
  if (!_msalReady) {
    await msalInstance.initialize();
    _msalReady = true;
  }
};

const getToken = async () => {
  await msalInit();
  const accounts = msalInstance.getAllAccounts();
  if (!accounts.length) throw new Error("not_authenticated");
  try {
    const r = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
    return r.accessToken;
  } catch {
    const r = await msalInstance.acquireTokenPopup({ scopes: SCOPES });
    return r.accessToken;
  }
};

const doLogin = async () => {
  await msalInit();
  await msalInstance.loginPopup({ scopes: SCOPES });
  return msalInstance.getAllAccounts()[0];
};

const doLogout = async () => {
  await msalInit();
  const a = msalInstance.getAllAccounts()[0];
  if (a) await msalInstance.logoutPopup({ account: a });
};

/* ══════ GRAPH / EXCEL ══════ */
let _siteId = null;
const getSiteId = async (token) => {
  if (_siteId) return _siteId;
  const r = await fetch(
    `https://graph.microsoft.com/v1.0/sites/${CONFIG.siteHost}:${CONFIG.sitePath}`,
    { headers: { Authorization: `Bearer ${token}` } }
  );
  if (!r.ok) throw new Error(`Site introuvable (${r.status})`);
  _siteId = (await r.json()).id;
  return _siteId;
};

const xlFetch = async (method, path, body, token) => {
  const siteId = await getSiteId(token);
  const fp = CONFIG.filePath.split("/").map(encodeURIComponent).join("/");
  const url = `https://graph.microsoft.com/v1.0/sites/${siteId}/drive/root:/${fp}:/workbook/worksheets('DATA')/${path}`;
  const res = await fetch(url, {
    method,
    headers: { Authorization: `Bearer ${token}`, ...(body ? {"Content-Type":"application/json"} : {}) },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) throw new Error(`Graph ${res.status}: ${await res.text()}`);
  return res.status === 204 ? null : res.json();
};

const ROW_KEYS = ["id","date","mois","annee","calibre","machine","nbBoites","effectif","dureeH","duree","heuresOp","hParBoite","coutBoite","coutStandard","coutTotalReel","coutTotalStandard","ecart","details","trs","operation"];
const LAST_COL = String.fromCharCode(64 + ROW_KEYS.length);

const parseRow = (r) => ({
  id:r[0], date:r[1]||"", mois:r[2]||"", annee:r[3]||"2026", calibre:r[4]||"", machine:r[5]||"",
  nbBoites:Number(r[6])||0, effectif:Number(r[7])||0, dureeH:Number(r[8])||0, duree:r[9]||"",
  heuresOp:Number(r[10])||0, hParBoite:Number(r[11])||0, coutBoite:Number(r[12])||0,
  coutStandard:Number(r[13])||0, coutTotalReel:Number(r[14])||0, coutTotalStandard:Number(r[15])||0,
  ecart:Number(r[16])||0, details:r[17]||"", trs:Number(r[18])||0, operation:r[19]||"",
});

const entryToRow = (e) => ROW_KEYS.map(k => e[k] ?? "");

const loadFromSP = async () => {
  const token = await getToken();
  const data = await xlFetch("GET","usedRange",null,token);
  if (!data?.values || data.values.length <= 1) return [];
  return data.values.slice(1).filter(r=>r[0]!=null&&r[0]!=="").map(parseRow);
};

const saveToSP = async (entries) => {
  const token = await getToken();
  await xlFetch("POST",`range(address='A2:${LAST_COL}2001')/clear`,{applyTo:"contents"},token);
  if (!entries.length) return;
  const values = entries.map(entryToRow);
  await xlFetch("PATCH",`range(address='A2:${LAST_COL}${1+entries.length}')`,{values},token);
};

/* ══════ DONNÉES RÉFÉRENCE ══════ */
const CALIBRES = ["1/4 Club 125g","Ovaline 80g","1/6 RR 125g","Pelle 125g","Ronde 80g","Thon 160g"];

  {id:"ETU_HER_P1", nom:"Etuieuse 80g Hermassa P1", effMin:5, effMax:7, capH:4500, color:"#a78bfa"},

  {id:"ETU_HER_125",nom:"Etuieuse 125g Hermassa",   effMin:5, effMax:12,capH:3100, color:"#fb7185"},
  {id:"FAR_AIT",    nom:"Fardeleuse Ait Melloul",   effMin:3, effMax:4, capH:8000, color:"#f97316"},
  {id:"FAR_CER",    nom:"Fardeleuse Cermex",        effMin:6, effMax:18,capH:12000,color:"#e879f9"},
  {id:"PALET",      nom:"Palettiseur",               effMin:2, effMax:2, capH:15000,color:"#2dd4bf"},
  {id:"CONV_MSE",   nom:"Conv. MSE Manuel",          effMin:24,effMax:44,capH:2500, color:"#94a3b8"},
];
const CALIBRE_POSTE = {

  "Ovaline 80g":  ["ETU_HER_P1","ETU_CAS_P3","FAR_CER","PALET"],

  "Ronde 80g":    ["ETU_HER_P1","ETU_CAS_P3","FAR_AIT","PALET"],

const COUT_STD = {"1/4 Club 125g":0.118,"Ovaline 80g":0.095,"1/6 RR 125g":0.125,"Pelle 125g":0.132,"Ronde 80g":0.088,"Thon 160g":0.145};
const OPERATIONS = ["Mise en Etui","Fardelage","Palettisation","Marquage","Soufflage","Accumulation","Conditionnement"];
const MOIS_LIST  = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const PIE_COLS   = ["#38bdf8","#a78bfa","#34d399","#fbbf24","#fb7185","#f97316","#e879f9","#2dd4bf","#94a3b8"];

/* ══════ UI HELPERS ══════ */
const fmt  = (n,d=0) => (typeof n==="number"?n:0).toLocaleString("fr-MA",{minimumFractionDigits:d,maximumFractionDigits:d});
const cc   = p => p<70?"#22c55e":p<90?"#f59e0b":"#ef4444";

const IS   = {background:"#06101e",border:"1px solid #18304a",color:"#e2e8f0",padding:"8px 10px",borderRadius:6,fontSize:12,width:"100%",boxSizing:"border-box",outline:"none"};
const LS   = {fontSize:9,color:"#3d5a78",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",display:"block",marginBottom:3};
const CARD = {background:"#0b1828",border:"1px solid #172a3f",borderRadius:12,padding:20};
const TD   = {padding:"7px 8px",fontSize:11,color:"#b8ccd8",borderBottom:"1px solid #0f1c2e"};

/* ══════ ÉCRAN CONNEXION ══════ */
function LoginScreen({onLogin, error, loading}) {
  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#050c18",padding:20}}>
      <div style={{background:"#0b1828",border:"1px solid #172a3f",borderRadius:20,padding:48,textAlign:"center",maxWidth:420,width:"100%"}}>
        <div style={{width:64,height:64,background:"linear-gradient(135deg,#0ea5e9,#6366f1)",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 24px"}}>
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>

        }}>
          {loading
            ? <span style={{width:18,height:18,border:"2px solid white",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 1s linear infinite",display:"inline-block"}}/>

/* ══════ APP ══════ */
function App() {
  const [auth,      setAuth]      = useState("loading"); // loading | unauthenticated | authenticated
  const [authErr,   setAuthErr]   = useState(null);
  const [authLoad,  setAuthLoad]  = useState(false);
  const [user,      setUser]      = useState(null);
  const [entries,   setEntries]   = useState([]);
  const [syncing,   setSyncing]   = useState(false);
  const [syncErr,   setSyncErr]   = useState(null);
  const [page,      setPage]      = useState("dashboard");
  const [filtre,    setFiltre]    = useState("Tous");
  const [besoins,   setBesoins]   = useState(Object.fromEntries(CALIBRES.map(c=>[c,0])));
  const [planCfg,   setPlanCfg]   = useState(Object.fromEntries(POSTES.map(p=>[p.id,{heuresJ:8,effectif:p.effMin}])));
  const [nbJours,   setNbJours]   = useState(5);

  useEffect(()=>{
    (async()=>{
      try {
        await msalInit();
        await msalInstance.handleRedirectPromise().catch(()=>{});
        const account = msalInstance.getAllAccounts()[0];
        document.getElementById('loader').style.display='none';
        if (account) {
          setUser(account); setAuth("authenticated");
          setSyncing(true);
          try { setEntries(await loadFromSP()); } catch(e){ setSyncErr(e.message); }
          setSyncing(false);
        } else {
          setAuth("unauthenticated");
        }
      } catch(e) {
        document.getElementById('loader').style.display='none';
        setAuth("unauthenticated");
        setAuthErr("Erreur initialisation: " + e.message);
      }
    })();
  },[]);

  const handleLogin = async () => {
    setAuthLoad(true); setAuthErr(null);
    try {
      const account = await doLogin();
      setUser(account); setAuth("authenticated");
      setSyncing(true);
      try { setEntries(await loadFromSP()); } catch(e){ setSyncErr(e.message); }
      setSyncing(false);
    } catch(e) {
      setAuthErr(e.message || "Connexion échouée");
    } finally { setAuthLoad(false); }
  };

  const handleLogout = async () => {
    await doLogout().catch(()=>{});
    setAuth("unauthenticated"); setEntries([]); setUser(null);
  };

  const saveEntries = async (ne) => {
    setEntries(ne); setSyncing(true); setSyncErr(null);
    try { await saveToSP(ne); } catch(e){ setSyncErr(e.message); }
    setSyncing(false);
  };

  const reload = async () => {
    setSyncing(true); setSyncErr(null);
    try { setEntries(await loadFromSP()); } catch(e){ setSyncErr(e.message); }
    setSyncing(false);
  };

  if (auth==="loading") return null; // loader HTML visible
  if (auth==="unauthenticated") return <LoginScreen onLogin={handleLogin} error={authErr} loading={authLoad}/>;

  const filt    = filtre==="Tous"?entries:entries.filter(e=>e.mois===filtre);
  const totalB  = filt.reduce((s,e)=>s+e.nbBoites,0);
  const totalH  = filt.reduce((s,e)=>s+e.heuresOp,0);
  const totalCR = filt.reduce((s,e)=>s+e.coutTotalReel,0);
  const totalCS = filt.reduce((s,e)=>s+e.coutTotalStandard,0);
  const avgTRS  = filt.length?filt.reduce((s,e)=>s+(e.trs||0),0)/filt.length:0;
  const ecart   = totalCR-totalCS;

  const byMois = MOIS_LIST.map(m=>{
    const me=entries.filter(e=>e.mois===m);
    return{m:m.slice(0,4),boites:me.reduce((s,e)=>s+e.nbBoites,0),heures:parseFloat(me.reduce((s,e)=>s+e.heuresOp,0).toFixed(1)),cr:Math.round(me.reduce((s,e)=>s+e.coutTotalReel,0)),cs:Math.round(me.reduce((s,e)=>s+e.coutTotalStandard,0)),trs:me.length?parseFloat((me.reduce((s,e)=>s+(e.trs||0),0)/me.length).toFixed(1)):0};
  }).filter(x=>x.boites>0||x.cr>0);

  const byPoste=POSTES.map(p=>{const pe=filt.filter(e=>e.machine===p.nom);return{name:p.nom.replace("Etuieuse ","Etu. ").replace("Fardeleuse ","Fard. "),boites:pe.reduce((s,e)=>s+e.nbBoites,0),color:p.color};}).filter(x=>x.boites>0);

  const planResults=POSTES.map(p=>{
    const cfg=planCfg[p.id];
    const bb=CALIBRES.reduce((s,c)=>(CALIBRE_POSTE[c]?.includes(p.id)?s+(besoins[c]||0):s),0);
    const cap=p.capH*cfg.heuresJ*nbJours;
    const chg=cap>0?parseFloat(((bb/cap)*100).toFixed(1)):0;
    const hb=p.capH>0?parseFloat((bb/p.capH).toFixed(1)):0;
    const effBesoin=hb>0?Math.max(p.effMin,Math.min(p.effMax,Math.ceil(hb/cfg.heuresJ))):0;
    return{...p,bb:Math.floor(bb),hb,chg,effBesoin,cfg};
  });

  const navItems=[{id:"dashboard",label:"📊 Dashboard"},{id:"saisie",label:"✏️ Saisie"},{id:"planning",label:"📅 Planning"},{id:"implantation",label:"🗺️ Implantation"}];

  return (
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",background:"#050c18",minHeight:"100vh",color:"#e2e8f0"}}>
      <header style={{background:"#090f1e",borderBottom:"1px solid #152333",display:"flex",alignItems:"center",padding:"0 16px",height:56,position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          <div style={{width:32,height:32,background:"linear-gradient(135deg,#0ea5e9,#6366f1)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          </div>
          <div>
            <div style={{fontSize:12,fontWeight:800,color:"#f1f5f9"}}>PSF CONDITIONNEMENT</div>
            <div style={{fontSize:8,color:"#2a4a65",fontWeight:700,letterSpacing:"0.1em"}}>SILVER FOOD</div>
          </div>
        </div>
        <nav style={{display:"flex",gap:2,marginLeft:20,flex:1}}>
          {navItems.map(({id,label})=>(
            <button key={id} onClick={()=>setPage(id)} style={{padding:"6px 12px",borderRadius:6,border:"none",cursor:"pointer",background:page===id?"rgba(14,165,233,0.12)":"transparent",color:page===id?"#7dd3fc":"#3d5a78",fontSize:11,fontWeight:700,borderBottom:page===id?"2px solid #0ea5e9":"2px solid transparent"}}>
              {label}
            </button>
          ))}
        </nav>
        <div style={{display:"flex",alignItems:"center",gap:8,marginLeft:"auto"}}>
          {syncing&&<div style={{width:10,height:10,border:"2px solid #0ea5e9",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>}
          {!syncing&&!syncErr&&<div style={{width:7,height:7,borderRadius:"50%",background:"#22c55e"}} title="Synchronisé"/>}
          {syncErr&&<div style={{width:7,height:7,borderRadius:"50%",background:"#ef4444",cursor:"help"}} title={syncErr}/>}
          <button onClick={reload} style={{background:"none",border:"none",color:"#3d5a78",cursor:"pointer",fontSize:11}}>⟳</button>
          <select value={filtre} onChange={e=>setFiltre(e.target.value)} style={{...IS,width:110,padding:"5px 8px"}}>
            <option>Tous</option>
            {MOIS_LIST.map(m=><option key={m}>{m}</option>)}
          </select>
          <span style={{fontSize:10,color:"#3d5a78"}}>👤 {user?.name?.split(" ")[0]||"User"}</span>
          <button onClick={handleLogout} style={{background:"none",border:"none",color:"#3d5a78",cursor:"pointer",fontSize:11}}>⎋</button>
        </div>
      </header>

      {syncErr&&<div style={{background:"#1a0a0a",padding:"8px 20px",fontSize:11,color:"#ef4444",display:"flex",justifyContent:"space-between"}}>⚠️ {syncErr}<button onClick={()=>setSyncErr(null)} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer"}}>✕</button></div>}

      <main style={{padding:"16px 16px 80px"}}>
        {page==="dashboard"    && <DashboardPage {...{filt,totalB,totalH,totalCR,totalCS,avgTRS,ecart,byMois,byPoste}}/>}
        {page==="saisie"       && <SaisiePage entries={entries} saveEntries={saveEntries} filterMois={filtre} syncing={syncing}/>}
        {page==="planning"     && <PlanningPage {...{besoins,setBesoins,planCfg,setPlanCfg,planResults,nbJours,setNbJours}}/>}
        {page==="implantation" && <ImplantationPage planResults={planResults}/>}
      </main>

      <nav style={{position:"fixed",bottom:0,left:0,right:0,background:"#090f1e",borderTop:"1px solid #152333",zIndex:200,display:"flex",padding:"4px 0"}}>
        {navItems.map(({id,label})=>(
          <button key={id} onClick={()=>setPage(id)} style={{flex:1,border:"none",cursor:"pointer",padding:"8px 4px 6px",background:"transparent",color:page===id?"#7dd3fc":"#3d5a78",display:"flex",flexDirection:"column",alignItems:"center",gap:2,fontSize:9,fontWeight:700,borderTop:page===id?"2px solid #0ea5e9":"2px solid transparent"}}>
            {label.split(" ")[0]}<span>{label.split(" ").slice(1).join(" ")}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

/* ══════ SAISIE ══════ */
function SaisiePage({entries,saveEntries,filterMois,syncing}) {
  const blank={date:new Date().toLocaleDateString("fr-MA"),mois:MOIS_LIST[new Date().getMonth()],calibre:CALIBRES[0],machine:POSTES[0].nom,nbBoites:"",effectif:"",dureeH:"",details:"",operation:OPERATIONS[0]};
  const [form,setForm]=useState(blank);
  const [editId,setEditId]=useState(null);
  const [saved,setSaved]=useState(false);
  const [search,setSearch]=useState("");
  const [sortCol,setSortCol]=useState("date");
  const [sortDir,setSortDir]=useState(-1);

  const auto=()=>{
    const nb=parseFloat(form.nbBoites)||0,eff=parseFloat(form.effectif)||0,dH=parseFloat(form.dureeH)||0;
    const heOp=parseFloat((dH*eff).toFixed(2));
    const cStd=COUT_STD[form.calibre]||0.1;
    const p=POSTES.find(x=>x.nom===form.machine)||POSTES[0];
    const trs=(nb&&dH&&p.capH)?Math.min(100,parseFloat(((nb/(p.capH*dH))*100).toFixed(1))):0;
    const cBt=parseFloat((cStd*(trs<75?1.08:0.97)).toFixed(4));
    return{heOp,hPb:nb>0?parseFloat((heOp/nb).toFixed(6)):0,cBt,cStd,cTR:parseFloat((cBt*nb).toFixed(2)),cTS:parseFloat((cStd*nb).toFixed(2)),ecart:parseFloat(((cBt-cStd)*nb).toFixed(2)),trs};
  };

  const handleSubmit=()=>{
    if(!form.nbBoites||!form.effectif||!form.dureeH) return;
    const {heOp,hPb,cBt,cStd,cTR,cTS,ecart,trs}=auto();
    const dH=parseFloat(form.dureeH)||0;
    const entry={id:editId||Date.now(),...form,annee:"2026",
      nbBoites:parseInt(form.nbBoites),effectif:parseInt(form.effectif),dureeH:dH,
      duree:`${Math.floor(dH)}h${String(Math.round((dH%1)*60)).padStart(2,"0")}`,
      heuresOp:heOp,hParBoite:hPb,coutBoite:cBt,coutStandard:cStd,coutTotalReel:cTR,coutTotalStandard:cTS,ecart,trs};
    saveEntries(editId?entries.map(e=>e.id===editId?entry:e):[entry,...entries]);
    setEditId(null);setForm(blank);setSaved(true);setTimeout(()=>setSaved(false),3000);
  };

  const calc=auto(),hasCalc=form.nbBoites&&form.effectif&&form.dureeH;
  const shown=entries.filter(e=>(filterMois==="Tous"||e.mois===filterMois)&&(!search||e.calibre.toLowerCase().includes(search.toLowerCase())||e.machine.toLowerCase().includes(search.toLowerCase())||e.date.includes(search))).sort((a,b)=>(a[sortCol]>b[sortCol]?1:-1)*sortDir);

  return (
    <div style={{display:"grid",gridTemplateColumns:"380px 1fr",gap:18,alignItems:"start"}}>
      <div style={CARD}>
        <div style={{fontSize:14,fontWeight:800,color:"#f1f5f9",marginBottom:18}}>{editId?"✏️ Modifier":"➕ Nouvelle Opération"}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div><label style={LS}>Date</label><input type="text" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={IS}/></div>
          <div><label style={LS}>Mois</label><select value={form.mois} onChange={e=>setForm(f=>({...f,mois:e.target.value}))} style={IS}>{MOIS_LIST.map(m=><option key={m}>{m}</option>)}</select></div>
          <div style={{gridColumn:"1/-1"}}><label style={LS}>Calibre</label><select value={form.calibre} onChange={e=>setForm(f=>({...f,calibre:e.target.value}))} style={IS}>{CALIBRES.map(c=><option key={c}>{c}</option>)}</select></div>
          <div style={{gridColumn:"1/-1"}}><label style={LS}>Machine / Poste</label><select value={form.machine} onChange={e=>setForm(f=>({...f,machine:e.target.value}))} style={IS}>{POSTES.map(p=><option key={p.id}>{p.nom}</option>)}</select></div>
          <div><label style={LS}>Nb. Boîtes</label><input type="number" value={form.nbBoites} onChange={e=>setForm(f=>({...f,nbBoites:e.target.value}))} style={IS} placeholder="0"/></div>
          <div><label style={LS}>Effectif</label><input type="number" value={form.effectif} onChange={e=>setForm(f=>({...f,effectif:e.target.value}))} style={IS} placeholder="0"/></div>
          <div><label style={LS}>Durée (h)</label><input type="number" step="0.25" value={form.dureeH} onChange={e=>setForm(f=>({...f,dureeH:e.target.value}))} style={IS} placeholder="0.00"/></div>
          <div><label style={LS}>Opération</label><select value={form.operation} onChange={e=>setForm(f=>({...f,operation:e.target.value}))} style={IS}>{OPERATIONS.map(o=><option key={o}>{o}</option>)}</select></div>
          <div style={{gridColumn:"1/-1"}}><label style={LS}>Détails</label><input type="text" value={form.details} onChange={e=>setForm(f=>({...f,details:e.target.value}))} style={IS} placeholder="Notes..."/></div>
        </div>
        {hasCalc&&(
          <div style={{marginTop:14,background:"#060e1c",borderRadius:8,padding:12,border:"1px solid #172a3f"}}>
            <div style={{fontSize:9,color:"#3d5a78",fontWeight:700,textTransform:"uppercase",marginBottom:8}}>Calcul Automatique</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
              {[["H×Op",calc.heOp.toFixed(2)+"h"],["H/Boîte",calc.hPb.toFixed(5)],["TRS",calc.trs.toFixed(1)+"%"],["Coût/Bt",calc.cBt.toFixed(4)+" MAD"],["Coût Réel",fmt(calc.cTR,0)+" MAD"],["Écart",(calc.ecart>=0?"+":"")+fmt(calc.ecart,0)+" MAD"]].map(([k,v],i)=>(
                <div key={i} style={{background:"#0b1828",borderRadius:6,padding:"7px 8px"}}>
                  <div style={{fontSize:9,color:"#3d5a78"}}>{k}</div>
                  <div style={{fontSize:12,fontWeight:700,color:k==="TRS"?cc(calc.trs):k==="Écart"?(calc.ecart>0?"#ef4444":"#22c55e"):"#f1f5f9"}}>{v}</div>
                </div>
              ))}
            </div>
          </div>
        )}
        <div style={{display:"flex",gap:8,marginTop:16}}>
          <BtnP onClick={handleSubmit} disabled={syncing} style={{flex:1,justifyContent:"center",opacity:syncing?0.7:1}}>
            {syncing?<span style={{width:12,height:12,border:"2px solid white",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite",display:"inline-block"}}/>:"💾"}
            {editId?"Modifier":"Enregistrer"}
          </BtnP>
          {editId&&<BtnS onClick={()=>{setEditId(null);setForm(blank);}}>✕</BtnS>}
        </div>
        {saved&&<div style={{marginTop:10,color:"#22c55e",fontSize:11,fontWeight:700}}>✓ Enregistré sur SharePoint !</div>}
      </div>

      <div style={CARD}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
          <div style={{fontSize:14,fontWeight:800,color:"#f1f5f9"}}>Historique <span style={{fontSize:11,color:"#3d5a78"}}>({shown.length})</span></div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Rechercher..." style={{...IS,width:200}}/>
        </div>
        <div style={{overflowX:"auto",maxHeight:480,overflowY:"auto"}}>
          <table style={{width:"100%",borderCollapse:"separate",borderSpacing:"0 2px"}}>
            <thead style={{position:"sticky",top:0,background:"#0b1828",zIndex:1}}>
              <tr>
                {[["date","Date"],["calibre","Calibre"],["machine","Poste"],["nbBoites","Boîtes"],["effectif","Eff."],["dureeH","Durée"],["trs","TRS%"],["coutTotalReel","Coût"],["ecart","Écart"]].map(([k,l])=>(
                  <th key={k} onClick={()=>{setSortCol(k);setSortDir(sortCol===k?-sortDir:-1);}} style={{fontSize:9,color:"#3d5a78",fontWeight:700,textTransform:"uppercase",padding:"0 8px 10px",textAlign:"left",borderBottom:"1px solid #172a3f",cursor:"pointer",whiteSpace:"nowrap"}}>
                    {l}{sortCol===k?(sortDir===-1?"↓":"↑"):""}
                  </th>
                ))}
                <th style={{fontSize:9,color:"#3d5a78",fontWeight:700,textTransform:"uppercase",padding:"0 8px 10px",borderBottom:"1px solid #172a3f"}}>Act.</th>
              </tr>
            </thead>
            <tbody>
              {shown.slice(0,50).map(e=>{
                const p=POSTES.find(x=>x.nom===e.machine);
                return(<tr key={e.id} style={{background:"#070d1a"}}>
                  <td style={TD}>{e.date}</td>
                  <td style={TD}><span style={{background:"#172a3f",padding:"2px 6px",borderRadius:4,fontSize:10,fontWeight:600,color:"#7ab8d8"}}>{e.calibre}</span></td>
                  <td style={{...TD,maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {p&&<span style={{display:"inline-block",width:6,height:6,borderRadius:2,background:p.color,marginRight:5}}/>}{e.machine}
                  </td>
                  <td style={{...TD,fontWeight:700,color:"#f1f5f9"}}>{fmt(e.nbBoites)}</td>
                  <td style={TD}>{e.effectif}</td>
                  <td style={TD}>{e.duree}</td>
                  <td style={{...TD,fontWeight:700,color:cc(e.trs)}}>{e.trs}%</td>
                  <td style={TD}>{fmt(e.coutTotalReel,0)}</td>
                  <td style={{...TD,fontWeight:700,color:e.ecart>0?"#ef4444":"#22c55e"}}>{e.ecart>0?"+":""}{fmt(e.ecart,0)}</td>
                  <td style={TD}>
                    <div style={{display:"flex",gap:4}}>
                      <button onClick={()=>{setEditId(e.id);setForm({date:e.date,mois:e.mois,calibre:e.calibre,machine:e.machine,nbBoites:String(e.nbBoites),effectif:String(e.effectif),dureeH:String(e.dureeH),details:e.details||"",operation:e.operation||OPERATIONS[0]});}} style={{background:"#172a3f",border:"none",borderRadius:4,padding:"4px 6px",cursor:"pointer",color:"#7a9ab8",fontSize:11}}>✏️</button>
                      <button onClick={()=>saveEntries(entries.filter(x=>x.id!==e.id))} style={{background:"#1f1020",border:"none",borderRadius:4,padding:"4px 6px",cursor:"pointer",color:"#ef4444",fontSize:11}}>🗑️</button>
                    </div>
                  </td>
                </tr>);
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ══════ PLANNING ══════ */
function PlanningPage({besoins,setBesoins,planCfg,setPlanCfg,planResults,nbJours,setNbJours}) {
  const totalBB=Object.values(besoins).reduce((s,n)=>s+n,0);
  const totalH=planResults.reduce((s,p)=>s+p.hb,0);
  const totalEff=planResults.reduce((s,p)=>s+(p.effBesoin||0),0);
  const enSurcharge=planResults.filter(p=>p.chg>90).length;
  const adjB=(cal,d)=>setBesoins(b=>({...b,[cal]:Math.max(0,(b[cal]||0)+d)}));
  const adjC=(id,k,d,mn,mx)=>setPlanCfg(c=>({...c,[id]:{...c[id],[k]:Math.max(mn,Math.min(mx,c[id][k]+d))}}));
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:14,marginBottom:20}}>
        {[{l:"Besoin Total",v:fmt(totalBB)+" boîtes",c:"#0ea5e9"},{l:"Heures",v:fmt(totalH,1)+"h",c:"#8b5cf6"},{l:"Effectif",v:fmt(totalEff)+" op.",c:"#10b981"},{l:"Surcharges",v:String(enSurcharge),c:enSurcharge>0?"#ef4444":"#22c55e"},{l:"Période",v:null,c:"#f59e0b"}].map(({l,v,c},i)=>(
          <div key={i} style={{...CARD,borderColor:c+"30"}}>
            <div style={{fontSize:9,color:"#3d5a78",fontWeight:700,textTransform:"uppercase",marginBottom:8}}>{l}</div>
            {v!==null?<div style={{fontSize:22,fontWeight:800,color:c}}>{v}</div>:
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <button onClick={()=>setNbJours(j=>Math.max(1,j-1))} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:22,height:22,borderRadius:4,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>-</button>
                <span style={{fontSize:22,fontWeight:800,color:"#f1f5f9"}}>{nbJours}j</span>
                <button onClick={()=>setNbJours(j=>Math.min(30,j+1))} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:22,height:22,borderRadius:4,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
              </div>}
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"320px 1fr",gap:18}}>
        <div style={CARD}>
          <div style={{fontSize:12,fontWeight:700,color:"#7a9ab8",marginBottom:12}}>📦 Besoin par Calibre — {nbJours} jours</div>
          {CALIBRES.map(cal=>(
            <div key={cal} style={{marginBottom:12}}>
              <div style={{fontSize:11,color:"#8aa0bc",fontWeight:600,marginBottom:4}}>{cal}</div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <button onClick={()=>adjB(cal,-10000)} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:26,height:26,borderRadius:5,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                <input type="number" value={besoins[cal]||0} onChange={e=>setBesoins(b=>({...b,[cal]:Math.max(0,parseInt(e.target.value)||0)}))} style={{...IS,textAlign:"center",flex:1}}/>
                <button onClick={()=>adjB(cal,10000)} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:26,height:26,borderRadius:5,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
              </div>
            </div>
          ))}
          <BtnS onClick={()=>setBesoins(Object.fromEntries(CALIBRES.map(c=>[c,0])))} style={{marginTop:6,width:"100%",justifyContent:"center"}}>⟳ Réinitialiser</BtnS>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {planResults.map(p=>{
            const cfg=planCfg[p.id],bColor=cc(p.chg),hasLoad=p.bb>0;
            return(<div key={p.id} style={{...CARD,padding:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:10,height:10,borderRadius:3,background:p.color}}/>
                  <span style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>{p.nom}</span>
                  <span style={{fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:4,background:bColor+"1a",color:bColor}}>{hasLoad?cl(p.chg):"Non affecté"}</span>
                </div>
                <span style={{fontSize:24,fontWeight:800,color:hasLoad?bColor:"#2a4a65"}}>{hasLoad?p.chg.toFixed(0)+"%":"—"}</span>
              </div>
              <div style={{background:"#0b1828",borderRadius:4,height:7,marginBottom:10,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${Math.min(100,p.chg)}%`,background:bColor,borderRadius:4,transition:"width 0.5s ease"}}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:6}}>
                {[["BOÎTES",fmt(p.bb),"#e2e8f0"],["HEURES",p.hb+"h","#e2e8f0"],["EFF.BESOIN",p.effBesoin,"#10b981"]].map(([k,v,c])=>(
                  <div key={k} style={{background:"#060e1c",borderRadius:6,padding:"6px 8px"}}>
                    <div style={{fontSize:8,color:"#3d5a78",fontWeight:700}}>{k}</div>
                    <div style={{fontSize:13,fontWeight:800,color:c}}>{v}</div>
                  </div>
                ))}
                <div style={{background:"#060e1c",borderRadius:6,padding:"6px 8px"}}>
                  <div style={{fontSize:8,color:"#3d5a78",fontWeight:700,marginBottom:3}}>H/JOUR</div>
                  <div style={{display:"flex",alignItems:"center",gap:3}}>
                    <button onClick={()=>adjC(p.id,"heuresJ",-1,6,16)} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:16,height:16,borderRadius:3,cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>-</button>
                    <span style={{fontSize:12,fontWeight:800,color:"#0ea5e9",minWidth:16,textAlign:"center"}}>{cfg.heuresJ}</span>
                    <button onClick={()=>adjC(p.id,"heuresJ",+1,6,16)} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:16,height:16,borderRadius:3,cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                  </div>
                </div>
                <div style={{background:"#060e1c",borderRadius:6,padding:"6px 8px"}}>
                  <div style={{fontSize:8,color:"#3d5a78",fontWeight:700,marginBottom:3}}>EFFECTIF</div>
                  <div style={{display:"flex",alignItems:"center",gap:3}}>
                    <button onClick={()=>adjC(p.id,"effectif",-1,p.effMin,p.effMax)} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:16,height:16,borderRadius:3,cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>-</button>
                    <span style={{fontSize:12,fontWeight:800,color:"#22c55e",minWidth:16,textAlign:"center"}}>{cfg.effectif}</span>
                    <button onClick={()=>adjC(p.id,"effectif",+1,p.effMin,p.effMax)} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:16,height:16,borderRadius:3,cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                  </div>
                </div>
                <div style={{background:"#060e1c",borderRadius:6,padding:"6px 8px"}}>
                  <div style={{fontSize:8,color:"#3d5a78",fontWeight:700}}>MIN/MAX</div>
                  <div style={{fontSize:11,fontWeight:700,color:"#5a7a98"}}>{p.effMin}–{p.effMax}</div>
                </div>
              </div>
            </div>);
          })}
        </div>
      </div>
    </div>
  );
}
