<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PSF Conditionnement — Silver Food</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

<body>
<div id="loader">
  <div class="spin"></div>

</div>
<div id="errbox"></div>
<div id="root"></div>
<script>
window.onerror=function(m,s,l,c,e){
  document.getElementById('loader').style.display='none';
  var b=document.getElementById('errbox');
  b.style.display='block';
  b.textContent='❌ ERREUR: '+m+'\nSource: '+s+'\nLigne: '+l;
  return false;
};
window.addEventListener('unhandledrejection',function(e){
  document.getElementById('loader').style.display='none';
  var b=document.getElementById('errbox');
  b.style.display='block';
  b.textContent=(b.textContent?b.textContent+'\n':'')+'❌ ASYNC: '+(e.reason?.message||String(e.reason));
});
</script>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

/* ══════ CONFIG ══════ */
const CONFIG={
  clientId:"bd36d1f6-834c-4e79-a7ef-9ef988e38359",
  tenantId:"5c47add6-913a-41a7-9f2a-551fcaa9f602",
  siteHost:"silverfood0.sharepoint.com",
  sitePath:"/sites/mprSFO",
  filePath:"Documents partages/PSF-APP/PSF_DB.xlsx",
  redirectUri:"https://silver-food.github.io/PSF-APP/",
};

/* ══════ MSAL ══════ */
const msalInst=new msal.PublicClientApplication({
  auth:{clientId:CONFIG.clientId,authority:`https://login.microsoftonline.com/${CONFIG.tenantId}`,redirectUri:CONFIG.redirectUri},
  cache:{cacheLocation:"sessionStorage",storeAuthStateInCookie:false},
});
const SCOPES=["Files.ReadWrite.All","Sites.ReadWrite.All"];
let _ready=false;
const msalInit=async()=>{if(!_ready){await msalInst.initialize();_ready=true;}};
const getToken=async()=>{
  await msalInit();
  const accounts=msalInst.getAllAccounts();
  if(!accounts.length) throw new Error("not_authenticated");
  try{const r=await msalInst.acquireTokenSilent({scopes:SCOPES,account:accounts[0]});return r.accessToken;}
  catch{const r=await msalInst.acquireTokenPopup({scopes:SCOPES});return r.accessToken;}
};
const doLogin=async()=>{await msalInit();await msalInst.loginPopup({scopes:SCOPES});return msalInst.getAllAccounts()[0];};
const doLogout=async()=>{await msalInit();const a=msalInst.getAllAccounts()[0];if(a)await msalInst.logoutPopup({account:a});};

/* ══════ GRAPH ══════ */
let _siteId=null;
const getSiteId=async(tok)=>{
  if(_siteId)return _siteId;
  const r=await fetch(`https://graph.microsoft.com/v1.0/sites/${CONFIG.siteHost}:${CONFIG.sitePath}`,{headers:{Authorization:`Bearer ${tok}`}});
  if(!r.ok)throw new Error(`Site introuvable (${r.status})`);
  _siteId=(await r.json()).id;return _siteId;
};
const xlFetch=async(method,path,body,tok)=>{
  const sid=await getSiteId(tok);
  const fp=CONFIG.filePath.split("/").map(encodeURIComponent).join("/");
  const url=`https://graph.microsoft.com/v1.0/sites/${sid}/drive/root:/${fp}:/workbook/worksheets('DATA')/${path}`;
  const res=await fetch(url,{method,headers:{Authorization:`Bearer ${tok}`,...(body?{"Content-Type":"application/json"}:{})},body:body?JSON.stringify(body):undefined});
  if(!res.ok)throw new Error(`Graph ${res.status}: ${await res.text()}`);
  return res.status===204?null:res.json();
};
const KEYS=["id","date","mois","annee","calibre","machine","nbBoites","effectif","dureeH","duree","heuresOp","hParBoite","coutBoite","coutStandard","coutTotalReel","coutTotalStandard","ecart","details","trs","operation"];
const LCOL=String.fromCharCode(64+KEYS.length);
const parseRow=r=>({id:r[0],date:r[1]||"",mois:r[2]||"",annee:r[3]||"2026",calibre:r[4]||"",machine:r[5]||"",nbBoites:Number(r[6])||0,effectif:Number(r[7])||0,dureeH:Number(r[8])||0,duree:r[9]||"",heuresOp:Number(r[10])||0,hParBoite:Number(r[11])||0,coutBoite:Number(r[12])||0,coutStandard:Number(r[13])||0,coutTotalReel:Number(r[14])||0,coutTotalStandard:Number(r[15])||0,ecart:Number(r[16])||0,details:r[17]||"",trs:Number(r[18])||0,operation:r[19]||""});
const toRow=e=>KEYS.map(k=>e[k]??"");
const loadSP=async()=>{const tok=await getToken();const d=await xlFetch("GET","usedRange",null,tok);if(!d?.values||d.values.length<=1)return[];return d.values.slice(1).filter(r=>r[0]!=null&&r[0]!=="").map(parseRow);};
const saveSP=async(entries)=>{const tok=await getToken();await xlFetch("POST",`range(address='A2:${LCOL}2001')/clear`,{applyTo:"contents"},tok);if(!entries.length)return;await xlFetch("PATCH",`range(address='A2:${LCOL}${1+entries.length}')`,{values:entries.map(toRow)},tok);};

/* ══════ REF DATA ══════ */
const CALIBRES=["1/4 Club 125g","Ovaline 80g","1/6 RR 125g","Pelle 125g","Ronde 80g","Thon 160g"];
const POSTES=[
  {id:"ETU_CAS_125",nom:"Etuieuse 125g Castello",   effMin:5, effMax:12,capH:3200, color:"#38bdf8"},
  {id:"ETU_HER_P1", nom:"Etuieuse 80g Hermassa P1", effMin:5, effMax:7, capH:4500, color:"#a78bfa"},
  {id:"ETU_AIT_125",nom:"Etuieuse 125g Aitmelloul", effMin:5, effMax:12,capH:3000, color:"#34d399"},
  {id:"ETU_CAS_P3", nom:"Etuieuse 80g Castello P3", effMin:5, effMax:7, capH:4200, color:"#fbbf24"},
  {id:"ETU_HER_125",nom:"Etuieuse 125g Hermassa",   effMin:5, effMax:12,capH:3100, color:"#fb7185"},
  {id:"FAR_AIT",    nom:"Fardeleuse Ait Melloul",   effMin:3, effMax:4, capH:8000, color:"#f97316"},
  {id:"FAR_CER",    nom:"Fardeleuse Cermex",        effMin:6, effMax:18,capH:12000,color:"#e879f9"},
  {id:"PALET",      nom:"Palettiseur",               effMin:2, effMax:2, capH:15000,color:"#2dd4bf"},
  {id:"CONV_MSE",   nom:"Conv. MSE Manuel",          effMin:24,effMax:44,capH:2500, color:"#94a3b8"},
];
const CP={"1/4 Club 125g":["ETU_CAS_125","ETU_AIT_125","FAR_AIT","PALET"],"Ovaline 80g":["ETU_HER_P1","ETU_CAS_P3","FAR_CER","PALET"],"1/6 RR 125g":["ETU_CAS_125","ETU_AIT_125","FAR_CER","PALET"],"Pelle 125g":["ETU_CAS_125","ETU_HER_125","FAR_CER","PALET"],"Ronde 80g":["ETU_HER_P1","ETU_CAS_P3","FAR_AIT","PALET"],"Thon 160g":["ETU_HER_125","FAR_CER","PALET"]};
const CSTD={"1/4 Club 125g":0.118,"Ovaline 80g":0.095,"1/6 RR 125g":0.125,"Pelle 125g":0.132,"Ronde 80g":0.088,"Thon 160g":0.145};
const OPS=["Mise en Etui","Fardelage","Palettisation","Marquage","Soufflage","Accumulation","Conditionnement"];
const MOIS=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];

/* ══════ HELPERS ══════ */
const fmt=(n,d=0)=>(typeof n==="number"?n:0).toLocaleString("fr-MA",{minimumFractionDigits:d,maximumFractionDigits:d});
const cc=p=>p<70?"#22c55e":p<90?"#f59e0b":"#ef4444";
const cl=p=>p<70?"Normal":p<90?"Attention":"Critique";
const IS={background:"#06101e",border:"1px solid #18304a",color:"#e2e8f0",padding:"8px 10px",borderRadius:6,fontSize:12,width:"100%",boxSizing:"border-box",outline:"none"};
const LS={fontSize:9,color:"#3d5a78",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",display:"block",marginBottom:3};
const CARD={background:"#0b1828",border:"1px solid #172a3f",borderRadius:12,padding:20};
const TD={padding:"7px 8px",fontSize:11,color:"#b8ccd8",borderBottom:"1px solid #0f1c2e"};
const Btn=({g,...p})=><button {...p} style={{background:g?"linear-gradient(135deg,#0ea5e9,#6366f1)":"#172a3f",border:g?"none":"1px solid #1e3a54",color:"white",padding:"9px 14px",borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",gap:5,...p.style}}/>;

/* ══════ CHART.JS WRAPPER ══════ */
function ChartBar({labels,datasets,height=200}){
  const ref=useRef();
  useEffect(()=>{
    const ctx=ref.current.getContext('2d');
    const ch=new Chart(ctx,{type:'bar',data:{labels,datasets:datasets.map(d=>({...d,borderRadius:4,borderSkipped:false}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#5a7a98',font:{size:10}}},tooltip:{backgroundColor:'#0b1828',borderColor:'#172a3f',borderWidth:1,titleColor:'#e2e8f0',bodyColor:'#b8ccd8'}},scales:{x:{ticks:{color:'#3d5a78',font:{size:10}},grid:{color:'#0f1c2e'}},y:{ticks:{color:'#3d5a78',font:{size:10}},grid:{color:'#0f1c2e'}}}}});
    return()=>ch.destroy();
  },[JSON.stringify(labels),JSON.stringify(datasets)]);
  return <canvas ref={ref} style={{height}}/>;
}
function ChartLine({labels,dataset,height=200}){
  const ref=useRef();
  useEffect(()=>{
    const ctx=ref.current.getContext('2d');
    const grad=ctx.createLinearGradient(0,0,0,height);
    grad.addColorStop(0,'rgba(245,158,11,0.35)');
    grad.addColorStop(1,'rgba(245,158,11,0)');
    const ch=new Chart(ctx,{type:'line',data:{labels,datasets:[{label:dataset.label,data:dataset.data,borderColor:'#f59e0b',backgroundColor:grad,fill:true,tension:0.4,pointBackgroundColor:'#f59e0b',pointRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#0b1828',borderColor:'#172a3f',borderWidth:1,titleColor:'#e2e8f0',bodyColor:'#b8ccd8'}},scales:{x:{ticks:{color:'#3d5a78',font:{size:10}},grid:{color:'#0f1c2e'}},y:{ticks:{color:'#3d5a78',font:{size:10}},grid:{color:'#0f1c2e'}}}}});
    return()=>ch.destroy();
  },[JSON.stringify(labels),JSON.stringify(dataset)]);
  return <canvas ref={ref} style={{height}}/>;
}

/* ══════ LOGIN ══════ */
function LoginScreen({onLogin,error,loading}){
  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#050c18",padding:20}}>
      <div style={{background:"#0b1828",border:"1px solid #172a3f",borderRadius:20,padding:48,textAlign:"center",maxWidth:420,width:"100%"}}>
        <div style={{width:64,height:64,background:"linear-gradient(135deg,#0ea5e9,#6366f1)",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 24px"}}>
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        </div>
        <div style={{fontSize:26,fontWeight:800,color:"#f1f5f9",marginBottom:6}}>PSF Conditionnement</div>
        <div style={{fontSize:11,color:"#3d5a78",marginBottom:8,letterSpacing:"0.1em",fontWeight:700}}>SILVER FOOD — UNITÉ DE CONDITIONNEMENT</div>
        <div style={{fontSize:11,color:"#2a4a65",marginBottom:36,lineHeight:1.6}}>Connectez-vous avec votre compte Microsoft Silver Food pour accéder à l'application.</div>
        <button onClick={onLogin} disabled={loading} style={{background:"linear-gradient(135deg,#0ea5e9,#6366f1)",color:"white",border:"none",padding:"14px 32px",borderRadius:10,cursor:loading?"wait":"pointer",fontSize:14,fontWeight:700,width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:10,opacity:loading?0.7:1}}>
          {loading?<span style={{width:18,height:18,border:"2px solid white",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 1s linear infinite",display:"inline-block"}}/>:<svg width="18" height="18" viewBox="0 0 21 21"><path d="M10.5 0H0v10.5h10.5V0z" fill="#f25022"/><path d="M21 0H10.5v10.5H21V0z" fill="#7fba00"/><path d="M10.5 10.5H0V21h10.5V10.5z" fill="#00a4ef"/><path d="M21 10.5H10.5V21H21V10.5z" fill="#ffb900"/></svg>}
          {loading?"Connexion...":"Se connecter avec Microsoft"}
        </button>
        {error&&<div style={{marginTop:16,background:"#1a0a0a",border:"1px solid #ef444440",borderRadius:8,padding:"12px 16px",fontSize:11,color:"#ef4444",textAlign:"left",wordBreak:"break-word"}}>⚠️ {error}</div>}
        <div style={{marginTop:28,fontSize:10,color:"#1e3a54",lineHeight:1.6}}>Données stockées sur SharePoint Silver Food.</div>
      </div>
    </div>
  );
}

/* ══════ APP ══════ */
function App(){
  const [auth,setAuth]=useState("loading");
  const [authErr,setAuthErr]=useState(null);
  const [authLoad,setAuthLoad]=useState(false);
  const [user,setUser]=useState(null);
  const [entries,setEntries]=useState([]);
  const [syncing,setSyncing]=useState(false);
  const [syncErr,setSyncErr]=useState(null);
  const [page,setPage]=useState("dashboard");
  const [filtre,setFiltre]=useState("Tous");
  const [besoins,setBesoins]=useState(Object.fromEntries(CALIBRES.map(c=>[c,0])));
  const [planCfg,setPlanCfg]=useState(Object.fromEntries(POSTES.map(p=>[p.id,{heuresJ:8,effectif:p.effMin}])));
  const [nbJours,setNbJours]=useState(5);

  useEffect(()=>{(async()=>{
    try{
      await msalInit();
      await msalInst.handleRedirectPromise().catch(()=>{});
      const acc=msalInst.getAllAccounts()[0];
      document.getElementById('loader').style.display='none';
      if(acc){setUser(acc);setAuth("authenticated");setSyncing(true);try{setEntries(await loadSP());}catch(e){setSyncErr(e.message);}setSyncing(false);}
      else setAuth("unauthenticated");
    }catch(e){document.getElementById('loader').style.display='none';setAuth("unauthenticated");setAuthErr("Init: "+e.message);}
  })();},[]);

  const handleLogin=async()=>{setAuthLoad(true);setAuthErr(null);try{const acc=await doLogin();setUser(acc);setAuth("authenticated");setSyncing(true);try{setEntries(await loadSP());}catch(e){setSyncErr(e.message);}setSyncing(false);}catch(e){setAuthErr(e.message||"Connexion échouée");}finally{setAuthLoad(false);}};
  const handleLogout=async()=>{await doLogout().catch(()=>{});setAuth("unauthenticated");setEntries([]);setUser(null);};
  const saveEntries=async(ne)=>{setEntries(ne);setSyncing(true);setSyncErr(null);try{await saveSP(ne);}catch(e){setSyncErr(e.message);}setSyncing(false);};
  const reload=async()=>{setSyncing(true);setSyncErr(null);try{setEntries(await loadSP());}catch(e){setSyncErr(e.message);}setSyncing(false);};

  if(auth==="loading")return null;
  if(auth==="unauthenticated")return <LoginScreen onLogin={handleLogin} error={authErr} loading={authLoad}/>;

  const filt=filtre==="Tous"?entries:entries.filter(e=>e.mois===filtre);
  const tB=filt.reduce((s,e)=>s+e.nbBoites,0),tH=filt.reduce((s,e)=>s+e.heuresOp,0);
  const tCR=filt.reduce((s,e)=>s+e.coutTotalReel,0),tCS=filt.reduce((s,e)=>s+e.coutTotalStandard,0);
  const avgTRS=filt.length?filt.reduce((s,e)=>s+(e.trs||0),0)/filt.length:0;
  const planResults=POSTES.map(p=>{const cfg=planCfg[p.id];const bb=CALIBRES.reduce((s,c)=>(CP[c]?.includes(p.id)?s+(besoins[c]||0):s),0);const cap=p.capH*cfg.heuresJ*nbJours;const chg=cap>0?parseFloat(((bb/cap)*100).toFixed(1)):0;const hb=p.capH>0?parseFloat((bb/p.capH).toFixed(1)):0;const effBesoin=hb>0?Math.max(p.effMin,Math.min(p.effMax,Math.ceil(hb/cfg.heuresJ))):0;return{...p,bb:Math.floor(bb),hb,chg,effBesoin,cfg};});
  const navItems=[{id:"dashboard",label:"📊 Dashboard"},{id:"saisie",label:"✏️ Saisie"},{id:"planning",label:"📅 Planning"},{id:"implantation",label:"🗺️ Implantation"}];

  return(
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",background:"#050c18",minHeight:"100vh",color:"#e2e8f0"}}>
      <header style={{background:"#090f1e",borderBottom:"1px solid #152333",display:"flex",alignItems:"center",padding:"0 16px",height:56,position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          <div style={{width:32,height:32,background:"linear-gradient(135deg,#0ea5e9,#6366f1)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          </div>
          <div><div style={{fontSize:12,fontWeight:800,color:"#f1f5f9"}}>PSF CONDITIONNEMENT</div><div style={{fontSize:8,color:"#2a4a65",fontWeight:700}}>SILVER FOOD</div></div>
        </div>
        <nav style={{display:"flex",gap:2,marginLeft:20,flex:1}}>
          {navItems.map(({id,label})=>(
            <button key={id} onClick={()=>setPage(id)} style={{padding:"6px 12px",borderRadius:6,border:"none",cursor:"pointer",background:page===id?"rgba(14,165,233,0.12)":"transparent",color:page===id?"#7dd3fc":"#3d5a78",fontSize:11,fontWeight:700,borderBottom:page===id?"2px solid #0ea5e9":"2px solid transparent"}}>
              {label}
            </button>
          ))}
        </nav>
        <div style={{display:"flex",alignItems:"center",gap:8,marginLeft:"auto"}}>
          {syncing&&<div style={{width:10,height:10,border:"2px solid #0ea5e9",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>}
          {!syncing&&!syncErr&&<div style={{width:7,height:7,borderRadius:"50%",background:"#22c55e"}} title="Synchronisé"/>}
          {syncErr&&<div style={{width:7,height:7,borderRadius:"50%",background:"#ef4444",cursor:"help"}} title={syncErr}/>}
          <button onClick={reload} style={{background:"none",border:"none",color:"#3d5a78",cursor:"pointer"}}>⟳</button>
          <select value={filtre} onChange={e=>setFiltre(e.target.value)} style={{...IS,width:110,padding:"5px 8px"}}>
            <option>Tous</option>{MOIS.map(m=><option key={m}>{m}</option>)}
          </select>
          <span style={{fontSize:10,color:"#5a7a98",padding:"4px 8px",background:"#0b1828",borderRadius:6,border:"1px solid #172a3f"}}>👤 {user?.name?.split(" ")[0]||"User"}</span>
          <button onClick={handleLogout} style={{background:"none",border:"none",color:"#3d5a78",cursor:"pointer",fontSize:13}}>⎋</button>
        </div>
      </header>
      {syncErr&&<div style={{background:"#1a0a0a",padding:"8px 20px",fontSize:11,color:"#ef4444",display:"flex",justifyContent:"space-between"}}>⚠️ {syncErr}<button onClick={()=>setSyncErr(null)} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer"}}>✕</button></div>}
      <main style={{padding:"16px 16px 80px"}}>
        {page==="dashboard"&&<Dashboard entries={entries} filt={filt} tB={tB} tH={tH} tCR={tCR} tCS={tCS} avgTRS={avgTRS}/>}
        {page==="saisie"&&<Saisie entries={entries} saveEntries={saveEntries} filterMois={filtre} syncing={syncing}/>}
        {page==="planning"&&<Planning besoins={besoins} setBesoins={setBesoins} planCfg={planCfg} setPlanCfg={setPlanCfg} planResults={planResults} nbJours={nbJours} setNbJours={setNbJours}/>}
        {page==="implantation"&&<Implantation planResults={planResults}/>}
      </main>
      <nav style={{position:"fixed",bottom:0,left:0,right:0,background:"#090f1e",borderTop:"1px solid #152333",zIndex:200,display:"flex",padding:"4px 0"}}>
        {navItems.map(({id,label})=>(
          <button key={id} onClick={()=>setPage(id)} style={{flex:1,border:"none",cursor:"pointer",padding:"8px 4px 5px",background:"transparent",color:page===id?"#7dd3fc":"#3d5a78",display:"flex",flexDirection:"column",alignItems:"center",gap:2,fontSize:9,fontWeight:700,borderTop:page===id?"2px solid #0ea5e9":"2px solid transparent"}}>
            <span style={{fontSize:16}}>{label.split(" ")[0]}</span>{label.split(" ").slice(1).join(" ")}
          </button>
        ))}
      </nav>
    </div>
  );
}

/* ══════ DASHBOARD ══════ */
function Dashboard({entries,filt,tB,tH,tCR,tCS,avgTRS}){
  const byMois=MOIS.map(m=>{const me=entries.filter(e=>e.mois===m);return{m:m.slice(0,4),b:me.reduce((s,e)=>s+e.nbBoites,0),cr:Math.round(me.reduce((s,e)=>s+e.coutTotalReel,0)),cs:Math.round(me.reduce((s,e)=>s+e.coutTotalStandard,0)),trs:me.length?parseFloat((me.reduce((s,e)=>s+(e.trs||0),0)/me.length).toFixed(1)):0};}).filter(x=>x.b>0||x.cr>0);
  const labels=byMois.map(x=>x.m);
  if(!filt.length)return(<div style={{...CARD,textAlign:"center",padding:60}}><div style={{fontSize:48,marginBottom:16}}>📊</div><div style={{fontSize:16,fontWeight:700,color:"#3d5a78",marginBottom:8}}>Aucune donnée</div><div style={{fontSize:12,color:"#2a4a65"}}>Commencez par saisir des opérations dans l'onglet Saisie</div></div>);
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:20}}>
        {[["📦 Boîtes Traitées",fmt(tB),"unités","#0ea5e9"],["⏱️ Heures",fmt(tH,1)+"h","main d'œuvre","#8b5cf6"],["⚡ TRS Moyen",fmt(avgTRS,1)+"%","rendement",cc(avgTRS)],["💰 Coût Réel",fmt(tCR,0),"MAD","#10b981"],["📊 Coût Standard",fmt(tCS,0),"MAD","#06b6d4"],["📉 Écart",(tCR-tCS>=0?"+":"")+fmt(tCR-tCS,0),"MAD",tCR>tCS?"#ef4444":"#22c55e"]].map(([l,v,s,c])=>(
          <div key={l} style={{...CARD,position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:c,borderRadius:"12px 12px 0 0"}}/>
            <div style={{fontSize:9,color:"#3d5a78",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10}}>{l}</div>
            <div style={{fontSize:22,fontWeight:800,color:c,lineHeight:1,marginBottom:2}}>{v}</div>
            <div style={{fontSize:9,color:"#3d5a78"}}>{s}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:16,marginBottom:16}}>
        <div style={CARD}><div style={{fontSize:11,fontWeight:700,color:"#7a9ab8",marginBottom:12}}>📈 Boîtes par Mois</div>
          <ChartBar labels={labels} datasets={[{label:"Boîtes",data:byMois.map(x=>x.b),backgroundColor:"rgba(14,165,233,0.7)"}]} height={200}/>
        </div>
        <div style={CARD}><div style={{fontSize:11,fontWeight:700,color:"#7a9ab8",marginBottom:12}}>⚡ TRS Mensuel (%)</div>
          <ChartLine labels={labels} dataset={{label:"TRS%",data:byMois.map(x=>x.trs)}} height={200}/>
        </div>
      </div>
      <div style={CARD}><div style={{fontSize:11,fontWeight:700,color:"#7a9ab8",marginBottom:12}}>💰 Coût Réel vs Standard (MAD)</div>
        <ChartBar labels={labels} datasets={[{label:"Réel",data:byMois.map(x=>x.cr),backgroundColor:"rgba(239,68,68,0.7)"},{label:"Standard",data:byMois.map(x=>x.cs),backgroundColor:"rgba(34,197,94,0.7)"}]} height={180}/>
      </div>
    </div>
  );
}

/* ══════ SAISIE ══════ */
function Saisie({entries,saveEntries,filterMois,syncing}){
  const blank={date:new Date().toLocaleDateString("fr-MA"),mois:MOIS[new Date().getMonth()],calibre:CALIBRES[0],machine:POSTES[0].nom,nbBoites:"",effectif:"",dureeH:"",details:"",operation:OPS[0]};
  const [form,setForm]=useState(blank);
  const [editId,setEditId]=useState(null);
  const [saved,setSaved]=useState(false);
  const [search,setSearch]=useState("");
  const [sortK,setSortK]=useState("date");
  const [sortD,setSortD]=useState(-1);

  const auto=()=>{
    const nb=parseFloat(form.nbBoites)||0,eff=parseFloat(form.effectif)||0,dH=parseFloat(form.dureeH)||0;
    const heOp=parseFloat((dH*eff).toFixed(2));
    const cS=CSTD[form.calibre]||0.1;
    const p=POSTES.find(x=>x.nom===form.machine)||POSTES[0];
    const trs=(nb&&dH&&p.capH)?Math.min(100,parseFloat(((nb/(p.capH*dH))*100).toFixed(1))):0;
    const cB=parseFloat((cS*(trs<75?1.08:0.97)).toFixed(4));
    return{heOp,hPb:nb>0?parseFloat((heOp/nb).toFixed(6)):0,cB,cS,cTR:parseFloat((cB*nb).toFixed(2)),cTS:parseFloat((cS*nb).toFixed(2)),ecart:parseFloat(((cB-cS)*nb).toFixed(2)),trs};
  };
  const submit=()=>{
    if(!form.nbBoites||!form.effectif||!form.dureeH)return;
    const {heOp,hPb,cB,cS,cTR,cTS,ecart,trs}=auto();
    const dH=parseFloat(form.dureeH)||0;
    const e={id:editId||Date.now(),...form,annee:"2026",nbBoites:parseInt(form.nbBoites),effectif:parseInt(form.effectif),dureeH:dH,duree:`${Math.floor(dH)}h${String(Math.round((dH%1)*60)).padStart(2,"0")}`,heuresOp:heOp,hParBoite:hPb,coutBoite:cB,coutStandard:cS,coutTotalReel:cTR,coutTotalStandard:cTS,ecart,trs};
    saveEntries(editId?entries.map(x=>x.id===editId?e:x):[e,...entries]);
    setEditId(null);setForm(blank);setSaved(true);setTimeout(()=>setSaved(false),3000);
  };
  const calc=auto(),hasC=form.nbBoites&&form.effectif&&form.dureeH;
  const shown=entries.filter(e=>(filterMois==="Tous"||e.mois===filterMois)&&(!search||e.calibre.toLowerCase().includes(search.toLowerCase())||e.machine.toLowerCase().includes(search.toLowerCase())||e.date.includes(search))).sort((a,b)=>(a[sortK]>b[sortK]?1:-1)*sortD);
  return(
    <div style={{display:"grid",gridTemplateColumns:"380px 1fr",gap:18,alignItems:"start"}}>
      <div style={CARD}>
        <div style={{fontSize:14,fontWeight:800,color:"#f1f5f9",marginBottom:18}}>{editId?"✏️ Modifier":"➕ Nouvelle Opération"}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div><label style={LS}>Date</label><input type="text" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={IS}/></div>
          <div><label style={LS}>Mois</label><select value={form.mois} onChange={e=>setForm(f=>({...f,mois:e.target.value}))} style={IS}>{MOIS.map(m=><option key={m}>{m}</option>)}</select></div>
          <div style={{gridColumn:"1/-1"}}><label style={LS}>Calibre</label><select value={form.calibre} onChange={e=>setForm(f=>({...f,calibre:e.target.value}))} style={IS}>{CALIBRES.map(c=><option key={c}>{c}</option>)}</select></div>
          <div style={{gridColumn:"1/-1"}}><label style={LS}>Machine / Poste</label><select value={form.machine} onChange={e=>setForm(f=>({...f,machine:e.target.value}))} style={IS}>{POSTES.map(p=><option key={p.id}>{p.nom}</option>)}</select></div>
          <div><label style={LS}>Nb. Boîtes</label><input type="number" value={form.nbBoites} onChange={e=>setForm(f=>({...f,nbBoites:e.target.value}))} style={IS} placeholder="0"/></div>
          <div><label style={LS}>Effectif</label><input type="number" value={form.effectif} onChange={e=>setForm(f=>({...f,effectif:e.target.value}))} style={IS} placeholder="0"/></div>
          <div><label style={LS}>Durée (h)</label><input type="number" step="0.25" value={form.dureeH} onChange={e=>setForm(f=>({...f,dureeH:e.target.value}))} style={IS} placeholder="0.00"/></div>
          <div><label style={LS}>Opération</label><select value={form.operation} onChange={e=>setForm(f=>({...f,operation:e.target.value}))} style={IS}>{OPS.map(o=><option key={o}>{o}</option>)}</select></div>
          <div style={{gridColumn:"1/-1"}}><label style={LS}>Détails</label><input type="text" value={form.details} onChange={e=>setForm(f=>({...f,details:e.target.value}))} style={IS} placeholder="Notes..."/></div>
        </div>
        {hasC&&(
          <div style={{marginTop:14,background:"#060e1c",borderRadius:8,padding:12,border:"1px solid #172a3f"}}>
            <div style={{fontSize:9,color:"#3d5a78",fontWeight:700,textTransform:"uppercase",marginBottom:8}}>Calcul Automatique</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
              {[["H×Op",calc.heOp.toFixed(2)+"h"],["H/Boîte",calc.hPb.toFixed(5)],["TRS",calc.trs.toFixed(1)+"%"],["Coût/Bt",calc.cB.toFixed(4)+" MAD"],["Coût Réel",fmt(calc.cTR,0)+" MAD"],["Écart",(calc.ecart>=0?"+":"")+fmt(calc.ecart,0)]].map(([k,v],i)=>(
                <div key={i} style={{background:"#0b1828",borderRadius:6,padding:"7px 8px"}}>
                  <div style={{fontSize:9,color:"#3d5a78"}}>{k}</div>
                  <div style={{fontSize:12,fontWeight:700,color:k==="TRS"?cc(calc.trs):k==="Écart"?(calc.ecart>0?"#ef4444":"#22c55e"):"#f1f5f9"}}>{v}</div>
                </div>
              ))}
            </div>
          </div>
        )}
        <div style={{display:"flex",gap:8,marginTop:16}}>
          <Btn g onClick={submit} disabled={syncing} style={{flex:1,justifyContent:"center",opacity:syncing?0.7:1}}>
            {syncing?<span style={{width:12,height:12,border:"2px solid white",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite",display:"inline-block"}}/>:"💾"}
            {editId?"Modifier":"Enregistrer sur SharePoint"}
          </Btn>
          {editId&&<Btn onClick={()=>{setEditId(null);setForm(blank);}}>✕</Btn>}
        </div>
        {saved&&<div style={{marginTop:10,color:"#22c55e",fontSize:11,fontWeight:700}}>✓ Enregistré sur SharePoint !</div>}
      </div>
      <div style={CARD}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
          <div style={{fontSize:14,fontWeight:800,color:"#f1f5f9"}}>Historique <span style={{fontSize:11,color:"#3d5a78"}}>({shown.length})</span></div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Rechercher..." style={{...IS,width:200}}/>
        </div>
        <div style={{overflowX:"auto",maxHeight:480,overflowY:"auto"}}>
          <table style={{width:"100%",borderCollapse:"separate",borderSpacing:"0 2px"}}>
            <thead style={{position:"sticky",top:0,background:"#0b1828",zIndex:1}}>
              <tr>{[["date","Date"],["calibre","Calibre"],["machine","Poste"],["nbBoites","Boîtes"],["effectif","Eff."],["dureeH","h"],["trs","TRS"],["coutTotalReel","Coût"],["ecart","Écart"]].map(([k,l])=>(
                <th key={k} onClick={()=>{setSortK(k);setSortD(sortK===k?-sortD:-1);}} style={{fontSize:9,color:"#3d5a78",fontWeight:700,textTransform:"uppercase",padding:"0 8px 10px",textAlign:"left",borderBottom:"1px solid #172a3f",cursor:"pointer",whiteSpace:"nowrap"}}>
                  {l}{sortK===k?(sortD===-1?"↓":"↑"):""}
                </th>
              ))}
              <th style={{fontSize:9,color:"#3d5a78",fontWeight:700,padding:"0 8px 10px",borderBottom:"1px solid #172a3f"}}>Act.</th></tr>
            </thead>
            <tbody>
              {shown.slice(0,50).map(e=>{
                const p=POSTES.find(x=>x.nom===e.machine);
                return(<tr key={e.id} style={{background:"#070d1a"}}>
                  <td style={TD}>{e.date}</td>
                  <td style={TD}><span style={{background:"#172a3f",padding:"2px 6px",borderRadius:4,fontSize:10,fontWeight:600,color:"#7ab8d8"}}>{e.calibre}</span></td>
                  <td style={{...TD,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p&&<span style={{display:"inline-block",width:6,height:6,borderRadius:2,background:p.color,marginRight:5}}/>}{e.machine}</td>
                  <td style={{...TD,fontWeight:700,color:"#f1f5f9"}}>{fmt(e.nbBoites)}</td>
                  <td style={TD}>{e.effectif}</td><td style={TD}>{e.duree}</td>
                  <td style={{...TD,fontWeight:700,color:cc(e.trs)}}>{e.trs}%</td>
                  <td style={TD}>{fmt(e.coutTotalReel,0)}</td>
                  <td style={{...TD,fontWeight:700,color:e.ecart>0?"#ef4444":"#22c55e"}}>{e.ecart>0?"+":""}{fmt(e.ecart,0)}</td>
                  <td style={TD}><div style={{display:"flex",gap:4}}>
                    <button onClick={()=>{setEditId(e.id);setForm({date:e.date,mois:e.mois,calibre:e.calibre,machine:e.machine,nbBoites:String(e.nbBoites),effectif:String(e.effectif),dureeH:String(e.dureeH),details:e.details||"",operation:e.operation||OPS[0]});}} style={{background:"#172a3f",border:"none",borderRadius:4,padding:"4px 6px",cursor:"pointer"}}>✏️</button>
                    <button onClick={()=>saveEntries(entries.filter(x=>x.id!==e.id))} style={{background:"#1f1020",border:"none",borderRadius:4,padding:"4px 6px",cursor:"pointer"}}>🗑️</button>
                  </div></td>
                </tr>);
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ══════ PLANNING ══════ */
function Planning({besoins,setBesoins,planCfg,setPlanCfg,planResults,nbJours,setNbJours}){
  const tB=Object.values(besoins).reduce((s,n)=>s+n,0);
  const tH=planResults.reduce((s,p)=>s+p.hb,0);
  const tE=planResults.reduce((s,p)=>s+(p.effBesoin||0),0);
  const nS=planResults.filter(p=>p.chg>90).length;
  const adjB=(c,d)=>setBesoins(b=>({...b,[c]:Math.max(0,(b[c]||0)+d)}));
  const adjC=(id,k,d,mn,mx)=>setPlanCfg(c=>({...c,[id]:{...c[id],[k]:Math.max(mn,Math.min(mx,c[id][k]+d))}}));
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:14,marginBottom:20}}>
        {[{l:"Besoin Total",v:fmt(tB)+" boîtes",c:"#0ea5e9"},{l:"Heures",v:fmt(tH,1)+"h",c:"#8b5cf6"},{l:"Effectif",v:tE+" op.",c:"#10b981"},{l:"Surcharges",v:String(nS),c:nS>0?"#ef4444":"#22c55e"},{l:"Période",v:null,c:"#f59e0b"}].map(({l,v,c},i)=>(
          <div key={i} style={{...CARD,borderColor:c+"30"}}>
            <div style={{fontSize:9,color:"#3d5a78",fontWeight:700,textTransform:"uppercase",marginBottom:8}}>{l}</div>
            {v?<div style={{fontSize:22,fontWeight:800,color:c}}>{v}</div>:
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <button onClick={()=>setNbJours(j=>Math.max(1,j-1))} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:22,height:22,borderRadius:4,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>-</button>
                <span style={{fontSize:22,fontWeight:800,color:"#f1f5f9"}}>{nbJours}j</span>
                <button onClick={()=>setNbJours(j=>Math.min(30,j+1))} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:22,height:22,borderRadius:4,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
              </div>}
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"300px 1fr",gap:18}}>
        <div style={CARD}>
          <div style={{fontSize:12,fontWeight:700,color:"#7a9ab8",marginBottom:12}}>📦 Besoin par Calibre ({nbJours}j)</div>
          {CALIBRES.map(cal=>(
            <div key={cal} style={{marginBottom:12}}>
              <div style={{fontSize:11,color:"#8aa0bc",fontWeight:600,marginBottom:4}}>{cal}</div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <button onClick={()=>adjB(cal,-10000)} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:26,height:26,borderRadius:5,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                <input type="number" value={besoins[cal]||0} onChange={e=>setBesoins(b=>({...b,[cal]:Math.max(0,parseInt(e.target.value)||0)}))} style={{...IS,textAlign:"center",flex:1}}/>
                <button onClick={()=>adjB(cal,10000)} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:26,height:26,borderRadius:5,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
              </div>
            </div>
          ))}
          <Btn onClick={()=>setBesoins(Object.fromEntries(CALIBRES.map(c=>[c,0])))} style={{marginTop:6,width:"100%",justifyContent:"center"}}>⟳ Réinitialiser</Btn>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {planResults.map(p=>{
            const cfg=planCfg[p.id],bC=cc(p.chg),has=p.bb>0;
            return(<div key={p.id} style={{...CARD,padding:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:10,height:10,borderRadius:3,background:p.color}}/>
                  <span style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>{p.nom}</span>
                  <span style={{fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:4,background:bC+"1a",color:bC}}>{has?cl(p.chg):"Non affecté"}</span>
                </div>
                <span style={{fontSize:24,fontWeight:800,color:has?bC:"#2a4a65"}}>{has?p.chg.toFixed(0)+"%":"—"}</span>
              </div>
              <div style={{background:"#0b1828",borderRadius:4,height:7,marginBottom:10,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${Math.min(100,p.chg)}%`,background:bC,borderRadius:4,transition:"width 0.5s ease"}}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:6}}>
                {[["BOÎTES",fmt(p.bb),"#e2e8f0"],["HEURES",p.hb+"h","#e2e8f0"],["EFF.",p.effBesoin,"#10b981"]].map(([k,v,c])=>(
                  <div key={k} style={{background:"#060e1c",borderRadius:6,padding:"6px 8px"}}>
                    <div style={{fontSize:8,color:"#3d5a78",fontWeight:700}}>{k}</div>
                    <div style={{fontSize:13,fontWeight:800,color:c}}>{v}</div>
                  </div>
                ))}
                <div style={{background:"#060e1c",borderRadius:6,padding:"6px 8px"}}>
                  <div style={{fontSize:8,color:"#3d5a78",fontWeight:700,marginBottom:3}}>H/JOUR</div>
                  <div style={{display:"flex",alignItems:"center",gap:3}}>
                    <button onClick={()=>adjC(p.id,"heuresJ",-1,6,16)} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:16,height:16,borderRadius:3,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>-</button>
                    <span style={{fontSize:12,fontWeight:800,color:"#0ea5e9",minWidth:18,textAlign:"center"}}>{cfg.heuresJ}</span>
                    <button onClick={()=>adjC(p.id,"heuresJ",+1,6,16)} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:16,height:16,borderRadius:3,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                  </div>
                </div>
                <div style={{background:"#060e1c",borderRadius:6,padding:"6px 8px"}}>
                  <div style={{fontSize:8,color:"#3d5a78",fontWeight:700,marginBottom:3}}>EFF.</div>
                  <div style={{display:"flex",alignItems:"center",gap:3}}>
                    <button onClick={()=>adjC(p.id,"effectif",-1,p.effMin,p.effMax)} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:16,height:16,borderRadius:3,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>-</button>
                    <span style={{fontSize:12,fontWeight:800,color:"#22c55e",minWidth:18,textAlign:"center"}}>{cfg.effectif}</span>
                    <button onClick={()=>adjC(p.id,"effectif",+1,p.effMin,p.effMax)} style={{background:"#172a3f",border:"none",color:"#7a9ab8",width:16,height:16,borderRadius:3,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                  </div>
                </div>
                <div style={{background:"#060e1c",borderRadius:6,padding:"6px 8px"}}>
                  <div style={{fontSize:8,color:"#3d5a78",fontWeight:700}}>MIN/MAX</div>
                  <div style={{fontSize:11,fontWeight:700,color:"#5a7a98"}}>{p.effMin}–{p.effMax}</div>
                </div>
              </div>
            </div>);
          })}
        </div>
      </div>
    </div>
  );
}

/* ══════ IMPLANTATION ══════ */

      <div style={{height:48,marginBottom:10}}>
        {hd?(<div style={{background:"#060e1c",border:"1px solid #172a3f",borderRadius:8,padding:"8px 16px",display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:13,fontWeight:700,color:"#f1f5f9"}}>{hd.nom}</span>
          {[["Charge",hd.chg.toFixed(1)+"%",cc(hd.chg)],["Boîtes",fmt(hd.bb),"#f1f5f9"],["Heures",hd.hb+"h","#f1f5f9"],["Cap./h",fmt(hd.capH),"#f1f5f9"]].map(([k,v,c])=>(
            <div key={k}><div style={{fontSize:9,color:"#3d5a78"}}>{k}</div><div style={{fontSize:13,fontWeight:700,color:c}}>{v}</div></div>
          ))}
        </div>):(<div style={{background:"#060e1c",border:"1px solid #172a3f",borderRadius:8,padding:"8px 16px",fontSize:11,color:"#3d5a78"}}>Survolez une machine pour afficher ses détails</div>)}
      </div>
      <div style={{overflowX:"auto"}}>
        <svg viewBox="0 0 940 460" width="100%" style={{display:"block",background:"#06101e",borderRadius:8}}>
          {[...Array(19)].map((_,i)=><line key={"h"+i} x1="0" y1={i*25} x2="940" y2={i*25} stroke="#0a1525" strokeWidth="0.5"/>)}
          {[...Array(38)].map((_,i)=><line key={"v"+i} x1={i*25} y1="0" x2={i*25} y2="460" stroke="#0a1525" strokeWidth="0.5"/>)}
          <rect x="80" y="5" width="770" height="50" fill="#0b1828" stroke="#172a3f" strokeWidth="1" rx="4"/>
          <text x="465" y="25" textAnchor="middle" fill="#1e3a54" fontSize="9" fontWeight="700">CAPACITÉ STOCKAGE PSF</text>
          <text x="465" y="40" textAnchor="middle" fill="#2a4a65" fontSize="8">Sans Rayonnage: 466 EURO PAL — Avec Rayonnage: 250 EURO PAL</text>
          <text x="88" y="100" fill="#172a3f" fontSize="8" fontWeight="700" letterSpacing="0.2em">ZONE PRODUCTION</text>
          {[{l:"Magasin\nEMB",x:6,y:120,w:68,h:190},{l:"Bureau\nChef",x:6,y:318,w:68,h:55},{l:"Bureau\nAdmin",x:6,y:378,w:68,h:58},{l:"Échantillo\nthèque",x:862,y:97,w:64,h:200}].map((s,i)=>(
            <g key={i}><rect x={s.x} y={s.y} width={s.w} height={s.h} fill="#0b1828" stroke="#172a3f" strokeWidth="1" rx="4"/>
            {s.l.split("\n").map((ln,li)=><text key={li} x={s.x+s.w/2} y={s.y+s.h/2-(s.l.split("\n").length-1)*7+li*13} textAnchor="middle" fill="#2a4a65" fontSize="8">{ln}</text>)}</g>
          ))}
          {machines.map((m,i)=>{
            const r=planResults.find(p=>p.nom===m.nom),chg=r?.chg||0,bC=r&&chg>0?cc(chg):"#172a3f",isH=hov===m.nom;
            const sl=m.nom.replace("Etuieuse ","Etu. ").replace("Fardeleuse ","Fard. ");
            return(<g key={i} onMouseEnter={()=>setHov(m.nom)} onMouseLeave={()=>setHov(null)} style={{cursor:"pointer"}}>
              {isH&&<rect x={m.x-3} y={m.y-3} width={m.w+6} height={m.h+6} fill="none" stroke={bC} strokeWidth="2" rx="6" opacity="0.5"/>}
              <rect x={m.x} y={m.y} width={m.w} height={m.h} fill={r&&chg>0?cc(chg)+"14":"#0c1828"} stroke={bC} strokeWidth={isH?1.5:1} rx="4"/>
              {r&&chg>0&&<rect x={m.x+2} y={m.y+m.h-4} width={Math.max(2,(m.w-4)*Math.min(1,chg/100))} height="3" fill={cc(chg)} rx="1.5"/>}
              {r&&<rect x={m.x+4} y={m.y+4} width="6" height="6" fill={r.color} rx="1.5"/>}
              <text x={m.x+m.w/2} y={m.y+m.h/2+1} textAnchor="middle" dominantBaseline="middle" fill={r&&chg>0?cc(chg):"#4a6a85"} fontSize="9" fontWeight="700">{sl}</text>
              {r&&chg>0&&<text x={m.x+m.w-4} y={m.y+11} textAnchor="end" fill={cc(chg)} fontSize="8" fontWeight="800">{chg.toFixed(0)}%</text>}
            </g>);
          })}
          <text x="88" y="452" fill="#172a3f" fontSize="8" fontWeight="600">SILVER FOOD — PSF — PLAN 2023</text>
        </svg>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
